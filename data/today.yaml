  - title: AI extracts hidden material rules from microscopic data to predict
      large-scale behavior
    url: https://techxplore.com/news/2026-07-ai-hidden-material-microscopic-large.html
    summary: Researchers from the National University of Singapore (NUS) have
      developed artificial intelligence (AI) methods that learn the large-scale
      behavior of complex materials from microscopic data. By automatically
      identifying a small number of hidden variables that capture the collective
      behavior of a system, the methods can predict how materials evolve over
      time while reducing the need for costly simulations.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/ai-methods-to-discover.jpg
