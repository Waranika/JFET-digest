  - title: Turning extreme heat into large-scale energy storage
    url: https://news.mit.edu/2026/turning-extreme-heat-large-scale-energy-storage-0318
    summary: Thermal batteries can efficiently store energy as heat. But building
      them requires a carefully designed system with materials that can
      withstand cycles of extremely high temperatures, without succumbing to
      problems like corrosion, thermal expansion, and structural fatigue.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202603/MIT-FourthWall-01-press.jpg?itok=e4UtWbTV
    categories: []
