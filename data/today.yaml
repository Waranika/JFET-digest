  - title: Finding Success in Industry as a Chip Designer
    url: https://spectrum.ieee.org/chip-design-academic-vs-industry
    summary: "I have been an application-specific IC (ASIC) designer for almost
      three decades. Over that time, I’ve moved through the full academic
      trajectory, from graduate student to full professor; later, I transitioned
      to industry after an unsuccessful stint at entrepreneurship. When I made
      the switch to the private sector in 2019, I began focusing on a critically
      important aspect of the electronic industry: silicon intellectual
      property."
