articles:
  - title: Sixteen new START.nano companies are developing hard-tech solutions with
      the support of MIT.nano
    url: https://news.mit.edu/2026/sixteen-new-startnano-companies-developing-hard-tech-solutions-with-mitnano-0407
    summary: MIT.nano has announced that 16 startups became active participants in
      its START.nano program in 2025, more than doubling the number of new
      companies from the previous year. Aimed at speeding the transition of
      hard-tech innovation to market, START.nano supports new ventures through
      the discounted use of MIT.nano shared facilities and a guided access to
      the MIT innovation ecosystem. The newly engaged startups are developing
      solutions for some of the world’s greatest challenges in health, climate,
      energy, semiconductors, novel materials, and quantum computing.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202603/mit-start.nano-Rheyo.jpg?itok=aj1qTyfA
    categories: []
    publishedAt: 2026-04-07T20:40:00.000Z
    source: MIT Artificial Intelligence
  - title: Solar-powered device disinfects drinking water in under an hour
    url: https://techxplore.com/news/2026-04-solar-powered-device-disinfects-hour.html
    summary: For many people living in developed nations, towns and cities take care
      of ensuring that residents' water is clean and safe. Municipalities have
      advanced filters and UV light disinfection technologies at their disposal.
      Some households have additional filters as well. In many places in the
      Global South, however, these technologies are not widely available. These
      areas, such as parts of Africa and South America, do have one advantage
      when it comes to water filtration—sunlight.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/pouring-water-sunset.jpg
    categories:
      - Engineering
    publishedAt: 2026-04-07T20:00:06.000Z
    source: TechXplore — Engineering
  - title: New method makes neural networks three times faster in wave propagation
      problems
    url: https://techxplore.com/news/2026-04-method-neural-networks-faster-propagation.html
    summary: Researchers at Skoltech have proposed a new approach to training neural
      networks for wave propagation in absorbing media. The method significantly
      improves the accuracy and stability of solutions and accelerates model
      training in the design of laser fusion systems, high-power laser
      facilities, and optical schemes with plasma elements, where the
      calculation of wave propagation and laser-plasma interaction consumes a
      significant portion of computational resources.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/skoltechs-new-method-m.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-04-07T19:00:05.000Z
    source: TechXplore — Computer Science
