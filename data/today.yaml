  - title: AI gives building inspection photos the location data they were missing
    url: https://techxplore.com/news/2026-06-ai-photos.html
    summary: When a building inspector takes a photo of a cracked wall, a leaking
      pipe or a faulty ceiling panel, that image carries almost no information
      about where exactly it was taken. There's no GPS signal indoors, and
      manually recording locations is slow, error-prone and easily forgotten. As
      a result, thousands of inspection photos sit in folders with no spatial
      context, making it hard to track problems over time or link them to the
      correct part of a building's maintenance records.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/ai-gives-building-insp.jpg
    categories:
      - Engineering
    publishedAt: 2026-06-23T20:00:04.000Z
    source: TechXplore — Engineering
  - title: Forgetting may be the secret to better AI language learning
    url: https://techxplore.com/news/2026-06-secret-ai-language.html
    summary: Giving AI a human-like memory limitation may actually help it learn
      language better. In their new proof-of-principle study, Abishek Thamma
      (University of Amsterdam) and Micha Heilbron (Max Planck Institute for
      Psycholinguistics) show that small language models equipped with a
      transient memory learn grammar more efficiently when trained on
      child-scale amounts of language input. The findings demonstrate how
      insights from psycholinguistics can inspire new approaches to AI learning.
      The findings are published in the journal Transactions of the Association
      for Computational Linguistics.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/brain-construction.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-06-23T18:40:18.000Z
    source: TechXplore — Computer Science
  - title: AI Is Learning to Read the Room
    url: https://spectrum.ieee.org/emotion-ai-context
    summary: Imagine sitting down at your desk and logging in for a performance
      review, with an AI system analyzing the conversation. You’ve been working
      long hours, balancing deadlines, and your manager asks how you’re doing.
      You say you’re fine, and maybe even smile, but there’s a hint of
      hesitation and your voice wavers. As you shift your posture, your
