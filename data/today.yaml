  - title: New driving AI ranks possible routes for safer, clearer decisions
    url: https://techxplore.com/news/2026-07-ai-routes-safer-clearer-decisions.html
    summary: A research team led by Jun Won Choi, a professor in the Department of
      Electrical and Computer Engineering at Seoul National University College
      of Engineering, has developed SafeDrive, an end-to-end (E2E) autonomous
      driving AI model aligned with recent global trends in autonomous driving
      technology. The work was selected as a highlight paper at the Conference
      on Computer Vision and Pattern Recognition (CVPR) 2026.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/snu-ece-prof-jun-won-c.jpg
    categories:
