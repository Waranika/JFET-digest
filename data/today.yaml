  - title: Deepfake X-rays are so real even doctors can’t tell the difference
    url: https://www.sciencedaily.com/releases/2026/03/260326011452.htm
    summary: Deepfake X-rays created by AI are now convincing enough to fool both
      doctors and AI models. In tests, radiologists had limited success
      identifying fake images, especially when they didn’t know they were being
      shown. This opens the door to risks like fraudulent medical claims and
      tampered diagnoses. Experts say stronger safeguards and detection tools
      are critical as the technology advances.
    imageUrl: https://www.sciencedaily.com/images/1920/anatomy-matched-real-and-gpt-4o-generated-x-rays.webp
    categories: []
    publishedAt: 2026-03-26T10:42:12.000Z
    source: ScienceDaily — Robotics
  - title: "AI system learns to keep warehouse robot traffic running smoothly "
    url: https://news.mit.edu/2026/ai-system-keeps-warehouse-robot-traffic-running-smoothly-0326
    summary: Inside a giant autonomous warehouse, hundreds of robots dart down
      aisles as they collect and distribute items to fulfill a steady stream of
      customer orders. In this busy environment, even small traffic jams or
      minor collisions can snowball into massive slowdowns.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202603/MIT-Warehouse-Auto-01-press.jpg?itok=TswYJbkp
    categories: []
    publishedAt: 2026-03-26T04:00:00.000Z
    source: MIT Robotics
  - title: First ever atomic movie reveals hidden driver of radiation damage
    url: https://www.sciencedaily.com/releases/2026/03/260324024251.htm
    summary: Researchers have visualized atoms in motion just before a
      radiation-driven decay process occurs, revealing a surprisingly dynamic
      scene. Instead of remaining fixed, the atoms roam and rearrange, directly
      influencing how and when the decay unfolds. This “atomic movie” shows that
      structure and motion play a central role in radiation damage mechanisms.
      The findings could improve our understanding of how harmful radiation
      affects biological matter.
    imageUrl: https://www.sciencedaily.com/images/1920/roaming-atoms.webp
    categories: []
    publishedAt: 2026-03-25T03:53:24.000Z
    source: ScienceDaily — Engineering
  - title: AI-powered robot learns how to harvest tomatoes more efficiently
    url: https://www.sciencedaily.com/releases/2026/03/260317064512.htm
    summary: A new tomato-picking robot is learning to think before it acts. Instead
      of simply identifying ripe fruit, it predicts how easy each tomato will be
      to harvest and adjusts its approach accordingly. This smarter strategy
      boosted success rates to 81%, with the robot even switching angles when
      needed. The breakthrough could pave the way for farms where robots and
      humans work side by side.
    imageUrl: https://www.sciencedaily.com/images/1920/ai-robot-harvesting-tomatoes.webp
    categories: []
    publishedAt: 2026-03-18T04:26:44.000Z
    source: ScienceDaily — Artificial Intelligence
