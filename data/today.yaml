  - title: "'Baked' yeast-based materials power 3D-printed architectural materials"
    url: https://techxplore.com/news/2026-06-yeast-based-materials-power-3d.html
    summary: "Researchers at Chalmers University of Technology, Sweden, have
      developed a new, entirely bio-based material from a somewhat unexpected
      ingredient: yeast. The material is 3D printed and customized for use in
      architectural and interior design elements that are currently made from
      non-renewable or fossil-based materials, such as plaster, plastic or
      synthetic textiles. These may be daylight modulating and sunlight
      protecting screens, room partitions or wall systems."
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/baked-printed-ready--p.jpg
