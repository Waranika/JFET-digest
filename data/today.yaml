  - title: Teaching AI agents to ask better questions by playing “Battleship”
    url: https://news.mit.edu/2026/teaching-ai-agents-ask-better-questions-playing-battleship-0603
    summary: "In 2026, the hype for artificial intelligence agents is louder than
      ever before. These semi-autonomous programs can “think” and execute
      well-defined tasks in areas like customer service and software
      development, typically using language models (LMs). But fields like
      medical diagnosis and scientific discovery require them to inquire about a
      vast range of solutions in uncertain environments, which LMs struggle
      with.Researchers at MIT’s Computer Science and Artificial Intelligence
      Laboratory (CSAIL) and Harvard University’s School of Engineering and
      Applied Sciences (SEAS) peered deeper into LMs to understand their main
      issues in high-stakes settings. Their test: “Battleship,” a classic
      guessing game that’s helped cognitive scientists study how humans seek
      information."
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202605/mit-csail-Co-Battleship.jpg?itok=f3N6UnA0
    categories: []
    publishedAt: 2026-06-03T21:00:00.000Z
    source: MIT Artificial Intelligence
