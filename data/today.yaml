  - title: "Handle with care: Soft robot gripper picks ripe fruit without bruising"
    url: https://techxplore.com/news/2026-04-soft-robot-gripper-ripe-fruit.html
    summary: When assessing the ripeness of fruit, sight and smell can tell you a
      lot, but the best indicator is often how the fruit feels. Cornell
      researchers used stretchable fiber-optic sensors to create a soft robot
      gripper that can predict the ripeness of strawberries by touch, then
      gently twist them off their branch or vine without causing any damage.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/handle-with-care-soft-1.jpg
    categories:
      - Robotics
    publishedAt: 2026-04-20T17:00:01.000Z
    source: TechXplore — Robotics
  - title: After 200 years scientists finally crack the “dolomite problem”
    url: https://www.sciencedaily.com/releases/2026/04/260420015840.htm
    summary: After two centuries of failed attempts, scientists have finally grown
      dolomite in the lab, cracking a long-standing geological puzzle. They
      discovered that the mineral’s growth stalls because of tiny defects—but in
      nature, those flaws get washed away over time. By mimicking this process
      with precise simulations and electron beam pulses, the team achieved
      record-breaking crystal growth. The finding could reshape how high-tech
      materials are made.
    imageUrl: https://www.sciencedaily.com/images/1920/wenhao-sun-and-joonsoo-kim.webp
    categories: []
    publishedAt: 2026-04-20T06:28:54.000Z
    source: ScienceDaily — Engineering
  - title: Artificial neurons successfully communicate with living brain cells
    url: https://www.sciencedaily.com/releases/2026/04/260417225020.htm
    summary: Engineers at Northwestern University have taken a striking leap toward
      merging machines with the human brain by printing artificial neurons that
      can actually communicate with real ones. These flexible, low-cost devices
      generate lifelike electrical signals capable of activating living brain
      cells, a breakthrough demonstrated in mouse brain tissue.
    imageUrl: https://www.sciencedaily.com/images/1920/aerosol-jet-printing.webp
    categories: []
    publishedAt: 2026-04-18T07:32:36.000Z
    source: ScienceDaily — Robotics
