  - title: New understanding of insect flight points way to stable flapping-wing
      robots
    url: https://techxplore.com/news/2026-05-insect-flight-stable-wing-robots.html
    summary: The way bugs and birds flap their wings may look effortless, but the
      dynamics that keep them aloft are dizzyingly complex and difficult to
      quantify. Cornell researchers have created a computational model that
      shows the effect of insects' morphology on stabilizing their flight. The
      findings could lead to a new way to understand the evolution of animal
      flight while also providing a blueprint for designing flapping-wing
      robots.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/new-understanding-of-i.jpg
    categories:
      - Robotics
    publishedAt: 2026-05-04T17:20:09.000Z
    source: TechXplore — Robotics
  - title: MIT scientists finally reveal the hidden structure of a mysterious
      high-tech material
    url: https://www.sciencedaily.com/releases/2026/05/260504023831.htm
    summary: For decades, relaxor ferroelectrics have powered everything from
      medical ultrasounds to sonar systems, yet their inner atomic structure
      remained a mystery—until now. Researchers have finally mapped their
      three-dimensional structure in unprecedented detail, uncovering hidden
      patterns in how electric charges are arranged at the nanoscale. The
      breakthrough not only challenges long-standing assumptions about how these
      materials behave but also allows scientists to refine the models used to
      design them.
    imageUrl: https://www.sciencedaily.com/images/1920/polar-domains-multi-slice-electron-ptychography.webp
    categories: []
    publishedAt: 2026-05-04T13:14:10.000Z
    source: ScienceDaily — Engineering
  - title: Powerful AI finds 100+ hidden planets in NASA data including rare and
      extreme worlds
    url: https://www.sciencedaily.com/releases/2026/05/260502233926.htm
    summary: Astronomers have unleashed a powerful new AI tool called RAVEN to comb
      through data from NASA’s TESS mission—and it’s paying off in a big way. By
      analyzing millions of stars, the system has confirmed over 100 exoplanets,
      including 31 brand-new worlds, and identified thousands more promising
      candidates. What makes this especially exciting is the discovery of rare
      and extreme planets, like those that whip around their stars in less than
      a day and others lurking in the mysterious “Neptunian desert,” where
      planets are thought to be scarce.
    imageUrl: https://www.sciencedaily.com/images/1920/ultra-short-period-planet.webp
    categories: []
    publishedAt: 2026-05-03T04:56:52.000Z
    source: ScienceDaily — Robotics
