articles:
  - title: New programmable photonic chip can control how fast light moves
    url: https://www.sciencedaily.com/releases/2026/07/260718010149.htm
    summary: Scientists have created a programmable optical chip that can slow light
      on demand, giving engineers far greater control over how optical signals
      propagate through a circuit. The technology could provide the delays,
      synchronization, and buffering functions needed to make light-based
      computing more practical. A single chip could eventually perform several
      tasks that currently require separate devices, potentially reducing energy
      use, cost, and complexity in AI servers and data centers.
    imageUrl: https://www.sciencedaily.com/images/1920/programmable-crit-photonic-integrated-circuit.webp
    categories: []
    publishedAt: 2026-07-22T02:43:34.000Z
    source: ScienceDaily — Artificial Intelligence
  - title: Review investigates effects of automation on the mining industry in South
      Africa
    url: https://techxplore.com/news/2026-07-effects-automation-industry-south-africa.html
    summary: South Africa's mining industry risks increased inequality through the
      adoption of fourth industrial revolution technologies unless automation is
      matched by stronger governance and workforce support, according to a
      review published in the International Journal of Mining and Mineral
      Engineering. The fourth industrial revolution refers to the growing use of
      digital technologies to improve industrial operations.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2022/mining-2.jpg
    categories:
      - Business
    publishedAt: 2026-07-22T02:40:04.000Z
    source: TechXplore — Engineering
