  - title: Magnetic coil setup guides microrobots without seeing them
    url: https://techxplore.com/news/2026-04-magnetic-setup-microrobots.html
    summary: SMU researchers have created an electromagnetic coil system that can
      control microrobots without requiring continuous visual tracking of their
      position—a significant advancement that could enable microrobots to
      operate inside the body, within industrial pipes and other places that
      aren't always visible with a camera.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/moving-microrobots-wit.jpg
    categories:
      - Robotics
    publishedAt: 2026-04-07T18:00:01.000Z
    source: TechXplore — Robotics
  - title: Decentralized Training Can Help Solve AI’s Energy Woes
    url: https://spectrum.ieee.org/decentralized-ai-training-2676670858
    summary: Artificial intelligence harbors an enormous energy appetite. Such
      constant cravings are evident in the hefty carbon footprint of the data
      centers behind the AI boom and the steady increase over time of carbon
      emissions from training frontier AI models.
    imageUrl: https://spectrum.ieee.org/media-library/illustration-of-several-data-servers-interconnected-across-long-distances.jpg?id=65477795&width=1245&height=700&coordinates=0%2C156%2C0%2C157
    categories:
