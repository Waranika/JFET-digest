  - title: How some skills become second nature
    url: https://news.mit.edu/2026/how-some-skills-become-second-nature-0304
    summary: "Expertise isn’t easy to pass down. Take riding a bike: A seasoned
      cyclist might talk a beginner through the basics of how to sit and when to
      push off. But other skills, like how hard to pedal to keep balanced, are
      more intuitive and harder to articulate. This implicit know-how is known
      as tacit knowledge, and very often, it can only be learned with experience
      and time."
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202603/MIT-Tacit-Knowledge-01-press.jpg?itok=pSMHF7gZ
    categories: []
    publishedAt: 2026-03-04T05:00:00.000Z
    source: MIT Engineering
  - title: Deepfake songs are exploding, but a new tool shuts them down
