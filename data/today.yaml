  - title: MIT scientists build the world’s largest collection of Olympiad-level
      math problems, and open it to everyone
    url: https://news.mit.edu/2026/mit-scientists-build-worlds-largest-collection-olympiad-level-math-problems-open-0424
    summary: Every year, the countries competing in the International Mathematical
      Olympiad (IMO) arrive with a booklet of their best, most original
      problems. Those booklets get shared among delegations, then quietly
      disappear. No one had ever collected them systematically, cleaned them,
      and made them available, not for AI researchers testing the limits of
      mathematical reasoning, and not for the students around the world training
      for these competitions largely on their own.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202604/MIT-MathNet.jpg?itok=-PPhyeth
    categories: []
    publishedAt: 2026-04-24T17:00:00.000Z
    source: MIT Artificial Intelligence
