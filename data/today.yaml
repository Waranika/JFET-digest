  - title: Majority voting method provides a smarter way to catch software bugs
    url: https://techxplore.com/news/2026-05-majority-voting-method-smarter-software.html
    summary: Researchers from The University of Osaka, Kyushu University, and the
      University of Victoria have developed a new method called Majority Voting
      SZZ (MV-SZZ) that accurately identifies defect-inducing software commits.
      By combining detailed code tracking with a majority voting system, the
      approach reduces false positives and outperforms existing techniques. This
      improvement could help developers debug software more efficiently and
      build more reliable systems. The work is published in the journal IEEE
      Transactions on Software Engineering.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/a-smarter-way-to-catch.jpg
    categories:
      - Software
    publishedAt: 2026-05-08T16:00:07.000Z
    source: TechXplore — Computer Science
  - title: New AI tool predicts airport traffic to avert devastating collisions
    url: https://techxplore.com/news/2026-05-ai-tool-airport-traffic-avert.html
    summary: In managing airport traffic, small errors can cause catastrophe. A
      group from the CMU Robotics Institute's AirLab used the Pittsburgh
      Supercomputing Center's Bridges-2 supercomputer to create World2Rules, an
      AI that draws from airport data and historical crash reports to help human
      controllers spot collisions before they happen. Their paper is published
      on the arXiv preprint server.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2023/busy-airport.jpg
