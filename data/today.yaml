  - title: "From motion to memory: Researchers create soft machines that amplify
      movement and remember touch"
    url: https://techxplore.com/news/2026-05-motion-memory-soft-machines-amplify.html
    summary: Conventional soft actuators are often limited by weak force, small
      displacement, and slow response. To overcome these limitations,
      researchers have developed a new mechanical system that can amplify motion
      and remember external triggers through the interaction between magnets and
      elastic membranes.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/from-motion-to-memory.jpg
    categories:
