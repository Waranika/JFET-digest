  - title: AI Is Starting to Build Better AI
    url: https://spectrum.ieee.org/recursive-self-improvement
    summary: The field of artificial intelligence was built on the premise that
      machines might someday improve themselves. In 1966, the English
      mathematician I. J. Good wrote that “an ultraintelligent machine could
      design even better machines; there would then unquestionably be an
      ‘intelligence explosion,’ and the intelligence of man would be left far
      behind.” AI researchers have long seen recursive self-improvement, or RSI,
      as something to both desire and fear. Today, advances in AI are raising
      the question of whether parts of that process are already underway.
    imageUrl: https://spectrum.ieee.org/media-library/illustration-of-two-identical-humanoid-robots-inspecting-each-other-with-magnifying-glasses.jpg?id=66686698&width=2000&height=1500&coordinates=0%2C0%2C0%2C0
    categories:
