  - title: AI uses as much energy as Iceland but scientists aren’t worried
    url: https://www.sciencedaily.com/releases/2026/03/260318033103.htm
    summary: AI’s growing energy use sounds alarming, but its global climate impact
      may be far smaller than expected. Researchers found that while AI consumes
      huge amounts of electricity, it barely moves the needle on overall
      emissions. The real impact is more localized, especially around data
      centers. Meanwhile, AI could become a powerful tool for building greener
      technologies.
    imageUrl: https://www.sciencedaily.com/images/1920/ai-energy-electricity.webp
    categories: []
    publishedAt: 2026-03-18T09:52:23.000Z
    source: ScienceDaily — Robotics
  - title: AI-powered robot learns how to harvest tomatoes more efficiently
    url: https://www.sciencedaily.com/releases/2026/03/260317064512.htm
    summary: A new tomato-picking robot is learning to think before it acts. Instead
      of simply identifying ripe fruit, it predicts how easy each tomato will be
      to harvest and adjusts its approach accordingly. This smarter strategy
      boosted success rates to 81%, with the robot even switching angles when
      needed. The breakthrough could pave the way for farms where robots and
      humans work side by side.
    imageUrl: https://www.sciencedaily.com/images/1920/ai-robot-harvesting-tomatoes.webp
    categories: []
    publishedAt: 2026-03-18T04:26:44.000Z
    source: ScienceDaily — Artificial Intelligence
  - title: Turning extreme heat into large-scale energy storage
    url: https://news.mit.edu/2026/turning-extreme-heat-large-scale-energy-storage-0318
    summary: Thermal batteries can efficiently store energy as heat. But building
      them requires a carefully designed system with materials that can
      withstand cycles of extremely high temperatures, without succumbing to
      problems like corrosion, thermal expansion, and structural fatigue.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202603/MIT-FourthWall-01-press.jpg?itok=e4UtWbTV
    categories: []
    publishedAt: 2026-03-18T04:00:00.000Z
    source: MIT Engineering
  - title: Scientists used 7,000 GPUs to simulate a tiny quantum chip in extreme
      detail
    url: https://www.sciencedaily.com/releases/2026/03/260317064504.htm
    summary: Researchers have pushed quantum chip design into a new era by
      simulating every physical detail before fabrication. Using a supercomputer
      with nearly 7,000 GPUs, they modeled how signals travel and interact
      inside an ultra-tiny chip. Unlike earlier “black box” approaches, this
      method captures real materials, layouts, and qubit behavior. The result is
      a powerful new way to spot problems early and build better quantum
      hardware faster.
    imageUrl: https://www.sciencedaily.com/images/1920/advanced-computer-hardware-quantum-cpu-chip.webp
    categories: []
    publishedAt: 2026-03-18T03:35:04.000Z
    source: ScienceDaily — Computer Science
  - title: A strange new quantum state appears when atoms get “frustrated”
    url: https://www.sciencedaily.com/releases/2026/03/260315225137.htm
    summary: Physicists at UC Santa Barbara have uncovered a new way to manipulate
      unusual magnetic states by exploiting “frustration” inside a crystal’s
      atomic structure. The team discovered a rare system where two different
      kinds of frustration—magnetic and electronic bond frustration—coexist and
      interact. By coupling these competing effects, researchers may be able to
      control exotic quantum states, potentially unlocking new ways to
      manipulate entangled spins for future quantum technologies.
    imageUrl: https://www.sciencedaily.com/images/1920/crystal-material-exotic-quantum-state.webp
    categories: []
    publishedAt: 2026-03-16T10:19:03.000Z
    source: ScienceDaily — Engineering
  - title: Jimi Hendrix Was a Systems Engineer
    url: https://spectrum.ieee.org/jimi-hendrix-systems-engineer
    summary: 3 February 1967 is a day that belongs in the annals of music history.
      It’s the day that Jimi Hendrix entered London’s Olympic Studios to record
      a song using a new component. The song was “Purple Haze,” and the
      component was the Octavia guitar pedal, created for Hendrix by sound
      engineer Roger Mayer. The pedal was a key element of a complex chain of
      analog elements responsible for the final sound, including the acoustics
      of the studio room itself. When they sent the tapes for remastering in the
      United States, the sounds on it were so novel that they included an
      accompanying note explaining that the distortion at the end was not
      malfunction but intention. A few months later, Hendrix would deliver his
      legendary electric guitar performance at the Monterey International Pop
      Festival.
    imageUrl: https://spectrum.ieee.org/media-library/an-electric-guitar-connected-to-a-number-of-effects-pedals-connect-to-an-amplifier-and-loudspeaker-stack.png?id=64983431&width=1200&height=400&coordinates=0%2C507%2C0%2C508
    categories:
      - Music
      - Jimi-hendrix
      - Sound-engineering
      - Typedepartments
    publishedAt: 2026-02-25T15:39:03.000Z
    source: IEEE Spectrum — DIY
