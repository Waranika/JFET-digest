  - title: AI reveals the invisible magnetic chaos wasting energy inside electric
      motors
    url: https://www.sciencedaily.com/releases/2026/05/260517211433.htm
    summary: "Electric vehicles are pushing scientists to tackle one of the biggest
      hidden energy drains inside electric motors: magnetic energy loss. Now,
      researchers in Japan have developed a powerful AI-driven physics model
      that can peer into the chaotic “maze-like” magnetic patterns inside motor
      materials and reveal how heat and microscopic magnetic structures trigger
      wasted energy."
    imageUrl: https://www.sciencedaily.com/images/1920/computational-model-identifies-origin-of-complex-magnetization-reversal-in-soft-magnets.webp
    categories: []
    publishedAt: 2026-05-18T04:02:36.000Z
    source: ScienceDaily — Engineering
