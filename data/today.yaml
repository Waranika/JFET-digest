  - title: TikTok's torn ACL content assessed for reliability
    url: https://techxplore.com/news/2026-06-tiktok-torn-acl-content-reliability.html
    summary: A 16-year-old footballer twists his knee midtackle. He's diagnosed with
      an anterior cruciate ligament (ACL) tear. Before seeing his physical
      therapist or asking his doctor questions, he goes to TikTok and searches
      for "ACL rehab exercises."
