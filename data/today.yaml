  - title: Artificial neural network reproduces gait patterns of four-legged animals
    url: https://techxplore.com/news/2026-03-artificial-neural-network-gait-patterns.html
    summary: Imagine a horse stumbling on a rock. It regains momentum, then hits
      bumpier terrain and slows to a walk. Back on steady ground, the horse
      picks up its pace to catch up with the herd. How is the horse able to
      transition between these different gaits? Researchers at Brown
      University's Carney Institute for Brain Science have developed an
      artificial neural network that shows how a four-legged creature may
      generate multiple distinct patterns in gait. Their research provides new
      insights into how the brain may process complex behaviors.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2022/horse-race.jpg
    categories:
      - Robotics
    publishedAt: 2026-03-23T21:20:08.000Z
    source: TechXplore — Robotics
