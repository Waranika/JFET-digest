  - title: Excuse me, is that solar panel pointing in the right direction?
    url: https://techxplore.com/news/2026-04-solar-panel.html
    summary: On a bright morning, graduate student Jeremy Klotz and professor Shree
      Nayar walked through upper Manhattan with a tall tripod and a camera that
      takes 360-degree images. Their route took them to bike docking stations,
      which use solar energy to power their kiosks, docking mechanisms, wireless
      communication, and even E-bike recharging in recent installations. At each
      docking station, the researchers raised the camera above the panel,
      snapped a spherical picture, and sent it to Klotz's laptop.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/is-that-solar-panel-po.jpg
    categories:
      - Engineering
    publishedAt: 2026-04-22T20:40:11.000Z
