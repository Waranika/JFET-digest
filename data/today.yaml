  - title: Study finds ChatGPT gets science wrong more often than you think
    url: https://www.sciencedaily.com/releases/2026/03/260317064452.htm
    summary: A new study put ChatGPT to the test by asking it to judge whether
      hundreds of scientific hypotheses were true or false—and the results were
      far from reassuring. While the AI got it right about 80% of the time on
      the surface, its performance dropped significantly when accounting for
      random guessing, revealing only modest reasoning ability. Even more
      concerning, it frequently contradicted itself when asked the exact same
      question multiple times, sometimes flipping answers back and forth.
    imageUrl: https://www.sciencedaily.com/images/1920/robot-artificial-intelligence-failure-head-exploding.webp
    categories: []
    publishedAt: 2026-03-18T02:39:38.000Z
    source: ScienceDaily — Robotics
