  - title: AI Agent Designs a RISC-V CPU Core From Scratch
    url: https://spectrum.ieee.org/ai-chip-design
    summary: In 2020, researchers fine-tuned a GPT-2 model to design fragments of
      logic circuits; in 2023, researchers used GPT-4 to help design an 8-bit
      processor with a novel instruction set; by 2024, a variety of LLMs could
      design and test chips with basic functionality, like dice rolls (though
      often these were flawed).
    imageUrl: https://spectrum.ieee.org/media-library/a-graphic-design-system-plot-of-a-risc-v-cpu-core-it-resembles-a-square-grid-covered-in-colorful-vertical-and-horizontal-scratc.jpg?id=65519361&width=1200&height=400&coordinates=0%2C1042%2C0%2C1042
