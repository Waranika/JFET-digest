  - title: A Bit of Data Center Heat Can Be Turned Back Into Electricity
    url: https://spectrum.ieee.org/data-center-thermoelectric-generation
    summary: Managing heat in AI data centers is a growing challenge. As
      hyperscalers cram more and more high-power computing systems into huge
      facilities, they generate more and more heat. Data center designs are
      switching from fan-based systems to liquid ones, which pipe water near
      electronics to gather up waste heat. That hot water is then cooled,
      dissipating the heat into the environment.
    imageUrl: https://spectrum.ieee.org/media-library/a-block-of-metal-with-t-shaped-crystals-inside-on-the-left-and-with-holes-where-the-crystals-were-on-the-right.jpg?id=66668556&width=2000&height=1500&coordinates=166%2C0%2C167%2C0
    categories:
      - Thermoelectrics
      - Ai-data-centers
      - Heat-management
      - Crystals
    publishedAt: 2026-05-02T13:00:01.000Z
    source: IEEE Spectrum — Computing & Chips
  - title: Reviving Teletext for Ham Radio
    url: https://spectrum.ieee.org/reviving-teletext-for-ham-radio
    summary: Once upon a time in Europe, television remote controls had a magic
      teletext button. Years before the internet stole into homes, pressing that
      button brought up teletext digital information services with hundreds of
      constantly updated pages. Living in Ireland in the 1980s and ’90s, my
      family accessed the national teletext service—Aertel—multiple times a day
      for weather and news bulletins, as well as things like TV program guides
      and updates on airport flight arrivals.
    imageUrl: https://spectrum.ieee.org/media-library/a-personal-computer-displays-a-blocky-computer-graphic-depicting-a-city-skyline-with-the-words-cq-cq-cq-de-kb1wnr-in-front-of.png?id=65575350&width=2000&height=1500&coordinates=0%2C197%2C0%2C198
