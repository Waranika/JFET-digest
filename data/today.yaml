  - title: Surface pre-treatment, barrier layer, automated machining and assembly of
      cryogenic CFRP hydrogen tanks
    url: https://techxplore.com/news/2026-06-surface-pre-treatment-barrier-layer.html
    summary: Researchers from Plasma Technology and Surfaces, Paint/Lacquer
      Technology, as well as Automation and Production Technology at Fraunhofer
      IFAM, in collaboration with HYTANK project partners, developed
      resource-efficient manufacturing and joining technologies for the
      production of large-format, double-walled hydrogen tanks made of carbon
      fiber-reinforced plastic (CFRP)—ranging from suitable surface
      pretreatments and functional barrier layers to automated production on a
      1:1 scale, including machining and adhesive-bonding assembly. The goal was
      to lay the groundwork for the future efficient production of lighter,
      leak-tight and—under cryogenic conditions—more reliable tank structures,
      for example, for the aerospace industry.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/surface-pre-treatment.jpg
    categories:
      - Engineering
    publishedAt: 2026-06-12T16:20:07.000Z
