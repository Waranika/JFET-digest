  - title: Mouse moves unlock realistic AI video control with no extra computing cost
    url: https://techxplore.com/news/2026-06-mouse-realistic-ai-video-extra.html
    summary: A technology developed at the Technion enables ordinary users to create
      realistic video clips intuitively, without the need for massive computing
      resources. Called Time-to-Move (TTM), it offers unprecedented control over
      the movement of objects and characters in AI-generated videos using
      nothing more than mouse movements, eliminating the need for complex and
      expensive infrastructure or training on millions of videos.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/mouse-moves-unlock-rea-1.jpg
