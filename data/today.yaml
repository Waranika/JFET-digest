  - title: US govt lifts restrictions on powerful AI models, Anthropic says
    url: https://techxplore.com/news/2026-07-govt-restrictions-powerful-ai-anthropic.html
    summary: Anthropic will soon begin restoring access globally to its most
      powerful AI models, Fable 5 and Mythos 5, after the U.S. government lifted
      a restriction on where they could be released, the company said Tuesday.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/us-artificial-intellig.jpg
    categories:
      - Machine learning & AI
    publishedAt: 2026-07-01T06:20:04.000Z
