  - title: Researchers improve efficiency, durability of nickel-based SOECs for
      electrochemical CO₂ conversion
    url: https://techxplore.com/news/2026-06-efficiency-durability-nickel-based-soecs.html
    summary: A Korean research team has resolved a major durability issue in solid
      oxide electrolysis cells (SOECs), a technology that converts carbon
      dioxide (CO₂) into high-value chemical feedstocks. Researchers at the
      Korea Research Institute of Chemical Technology (KRICT), led by Drs.
      Min-Chul Kim, Ji Hoon Park, and Jin Hee Lee, developed a new electrolyte
      interface engineering technology for nickel-based SOECs.
