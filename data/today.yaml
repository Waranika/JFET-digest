  - title: Advanced 3D printing creates origami-inspired structures
    url: https://techxplore.com/news/2026-06-advanced-3d-origami.html
    summary: Researchers at the Department of Energy's Manufacturing Demonstration
      Facility at Oak Ridge National Laboratory have introduced an innovation in
      additive manufacturing by integrating origami-inspired 3D printing
      techniques with hybrid composites—materials made from mixed reinforcing
      components. By eliminating the need for molds to fabricate a part, this
      process produces lightweight, cost-efficient structures with faster build
      times and greater adaptability.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/advanced-3d-printing-c.jpg
    categories:
      - Engineering
    publishedAt: 2026-06-15T21:00:09.000Z
    source: TechXplore — Engineering
  - title: The tenured engineers of 2026
    url: https://news.mit.edu/2026/tenured-engineers-0615
    summary: In 2026, MIT granted tenure to 10 faculty members across the School of
      Engineering. This year’s tenured engineers hold appointments in the
      departments of Aeronautics and Astronautics, Civil and Environmental
      Engineering, Electrical Engineering and Computer Science (EECS) — which
      reports jointly to the School of Engineering and MIT Schwarzman College of
      Computing — and Mechanical Engineering, as well as within the Institute
      for Medical Engineering and Sciences (IMES).
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202605/MIT-SoE-tenured-engineers-2026.jpg?itok=IN8AhLlp
    categories: []
