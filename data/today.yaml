  - title: A 100-year-old piano mystery has finally been solved
    url: https://www.sciencedaily.com/releases/2026/05/260528073949.htm
    summary: For more than a century, pianists and music teachers have argued over
      whether a performer’s touch can actually change the tone color of a piano
      note — and now scientists say the answer is yes. Using a cutting-edge
      sensor system that tracked piano key movements at 1,000 frames per second,
      researchers discovered that elite pianists subtly manipulate keys in ways
      that listeners can genuinely hear, even if they’ve never played piano
      before.
    imageUrl: https://www.sciencedaily.com/images/1920/grand-concert-piano-male-pianist.webp
