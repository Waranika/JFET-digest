  - title: Scientists finally see the atomic flaws hiding inside computer chips
    url: https://www.sciencedaily.com/releases/2026/03/260305182657.htm
    summary: Researchers at Cornell University have developed a powerful imaging
      technique that reveals atomic scale defects inside computer chips for the
      first time. Using an advanced electron microscopy method, the team mapped
      the exact positions of atoms inside tiny transistor structures and
      uncovered small imperfections nicknamed “mouse bites.” These defects form
      during the complex manufacturing process and can disrupt how electrons
      flow through a chip’s channels, which are only about 15 to 18 atoms wide.
    imageUrl: https://www.sciencedaily.com/images/1920/layers-inside-transistor-channel.webp
    categories: []
    publishedAt: 2026-03-06T00:42:42.000Z
    source: ScienceDaily — Computer Science
  - title: A simple hand photo may be the key to detecting a serious disease
    url: https://www.sciencedaily.com/releases/2026/03/260303201807.htm
    summary: Researchers at Kobe University have developed an AI system that can
      detect acromegaly, a rare hormone disorder, by analyzing photos of the
      back of the hand and a clenched fist. The disease often develops slowly
      and can take years to diagnose, even though untreated cases may shorten
      life expectancy.
    imageUrl: https://www.sciencedaily.com/images/1920/hand-image-ai-diagnose-acromegaly.webp
    categories: []
    publishedAt: 2026-03-04T16:59:51.000Z
    source: ScienceDaily — Robotics
  - title: ChatGPT as a therapist? New study reveals serious ethical risks
    url: https://www.sciencedaily.com/releases/2026/03/260302030642.htm
    summary: "As millions turn to ChatGPT and other AI chatbots for therapy-style
      advice, new research from Brown University raises a serious red flag: even
      when instructed to act like trained therapists, these systems routinely
      break core ethical standards of mental health care. In side-by-side
      evaluations with peer counselors and licensed psychologists, researchers
      uncovered 15 distinct ethical risks — from mishandling crisis situations
      and reinforcing harmful beliefs to showing biased responses and offering
      “deceptive empathy” that mimics care without real understanding."
    imageUrl: https://www.sciencedaily.com/images/1920/ai-therapy-robot.webp
    categories: []
    publishedAt: 2026-03-02T15:04:35.000Z
    source: ScienceDaily — Artificial Intelligence
  - title: Jimi Hendrix Was a Systems Engineer
    url: https://spectrum.ieee.org/jimi-hendrix-systems-engineer
    summary: 3 February 1967 is a day that belongs in the annals of music history.
      It’s the day that Jimi Hendrix entered London’s Olympic Studios to record
      a song using a new component. The song was “Purple Haze,” and the
      component was the Octavia guitar pedal, created for Hendrix by sound
      engineer Roger Mayer. The pedal was a key element of a complex chain of
      analog elements responsible for the final sound, including the acoustics
      of the studio room itself. When they sent the tapes for remastering in the
      United States, the sounds on it were so novel that they included an
      accompanying note explaining that the distortion at the end was not
      malfunction but intention. A few months later, Hendrix would deliver his
      legendary electric guitar performance at the Monterey International Pop
      Festival.
    imageUrl: https://spectrum.ieee.org/media-library/an-electric-guitar-connected-to-a-number-of-effects-pedals-connect-to-an-amplifier-and-loudspeaker-stack.png?id=64983431&width=1200&height=800&coordinates=0%2C181%2C0%2C181
    categories:
      - Music
      - Jimi-hendrix
      - Sound-engineering
      - Typedepartments
    publishedAt: 2026-02-25T15:39:03.000Z
    source: IEEE Spectrum — DIY
