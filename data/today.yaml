  - title: Open-source framework lets drones dodge obstacles in milliseconds while
      minimizing travel time
    url: https://techxplore.com/news/2026-05-source-framework-drones-dodge-obstacles.html
    summary: In the aftermath of a devastating earthquake, unpiloted aerial vehicles
      (UAVs) could fly through a collapsed building to map the scene, giving
      rescuers information they need to quickly reach survivors. But this
      remains an extremely challenging problem for an autonomous robot, which
      would need to swiftly adjust its trajectory to avoid sudden obstacles
      while staying on course.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/new-research-enables-a.jpg
