  - title: How MIT students are helping to prevent cyberattacks
    url: https://news.mit.edu/2026/mit-cybersecurity-clinic-preventing-cyberattacks-0713
    summary: In May 2019, the government of Baltimore, Maryland, fell into chaos.
      Cybercriminals had locked the city out of many of its critical files and
      demanded payment to decrypt them. The city refused to pay ransom. The
      attack incapacitated a swath of services, including real estate
      transactions and bill payment, and recovery costs soared into the
      millions.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/mit-dusp-Cybersecurity-Clinic.jpg?itok=EOIqtxuK
    categories: []
