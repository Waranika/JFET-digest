  - title: Molecular interface tuning lifts tandem solar cell efficiency to 25.1%
    url: https://techxplore.com/news/2026-03-molecular-interface-tuning-tandem-solar.html
    summary: Researchers at UNIST have unveiled a novel interface engineering
      technique that significantly improves both the performance and durability
      of perovskite/organic tandem solar cells (POTSCs). Published in Energy &
      Environmental Science, their study demonstrates how precise control of
      self-assembled monolayers (SAMs) at the molecular level can lead to more
      stable, high-efficiency solar devices and open new pathways for
      solar-driven hydrogen production.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/advanced-interface-eng-1.jpg
    categories:
      - Engineering
    publishedAt: 2026-03-27T16:00:02.000Z
    source: TechXplore — Engineering
  - title: A New Way to Spray Paint Color
    url: https://spectrum.ieee.org/spray-paint-color-creator
    summary: We’re all familiar with mixing red, yellow, and blue paint in various
      ratios to instantly make all kinds of colors. This works great for oils or
      watercolors, but fails when it comes to cans of spray paint. The paint
      droplets can’t be blended once they are aerosolized. Consequently,
      although spray cans are great for applying even coats of paint to large
      areas very quickly, spray-paint artists need a separate can for every
      color they want to use—until now.
    imageUrl: https://spectrum.ieee.org/media-library/a-portable-device-with-four-spray-paint-canisters-at-the-bottom-and-tubing-and-electronics-mounted-on-a-frame-above-them.png?id=65404484&width=1200&height=600&coordinates=0%2C481%2C0%2C481
