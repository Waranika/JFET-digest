  - title: Forget electrons, this breakthrough uses light-matter particles to power AI
    url: https://www.sciencedaily.com/releases/2026/05/260518041341.htm
    summary: Researchers at Penn have created a hybrid light-matter particle that
      could dramatically speed up AI computing while using far less energy. The
      breakthrough may help replace some electronic computing processes with
      ultra-efficient light-based technology.
    imageUrl: https://www.sciencedaily.com/images/1920/photonic-computing-component.webp
    categories: []
    publishedAt: 2026-05-19T00:23:26.000Z
    source: ScienceDaily — Computer Science
  - title: Reviving Teletext for Ham Radio
    url: https://spectrum.ieee.org/reviving-teletext-for-ham-radio
    summary: Once upon a time in Europe, television remote controls had a magic
      teletext button. Years before the internet stole into homes, pressing that
      button brought up teletext digital information services with hundreds of
      constantly updated pages. Living in Ireland in the 1980s and ’90s, my
      family accessed the national teletext service—Aertel—multiple times a day
      for weather and news bulletins, as well as things like TV program guides
      and updates on airport flight arrivals.
    imageUrl: https://spectrum.ieee.org/media-library/a-personal-computer-displays-a-blocky-computer-graphic-depicting-a-city-skyline-with-the-words-cq-cq-cq-de-kb1wnr-in-front-of.png?id=65575350&width=1200&height=800&coordinates=0%2C275%2C0%2C275
    categories:
