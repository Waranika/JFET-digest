      - Ieee-milestone
      - Computing
      - Ethernet
      - Digital-communication
    publishedAt: 2026-05-18T18:00:01.000Z
    source: IEEE Spectrum — Computing & Chips
  - title: Agentic AI for Robot Teams
    url: https://events.bizzabo.com/867156
    summary: This presentation highlights recent efforts at the Johns Hopkins
      Applied Physics Laboratory to advance agentic AI for collaborative robotic
      teams. It begins by framing the core challenges of enabling autonomy,
      coordination, and adaptability across heterogeneous systems, then
      introduces a scalable architecture designed to support agentic behaviors
      in multi-robot environments. The talk concludes with key challenges
      encountered and practical lessons learned from ongoing research and
      development.
    imageUrl: https://spectrum.ieee.org/media-library/johns-hopkins-whiting-school-of-engineering-logo-with-shield-emblem.png?id=66700256&width=980
    categories:
      - Type-webinar
      - Agentic-ai
      - Robotics
      - Llms
    publishedAt: 2026-05-18T10:00:01.000Z
    source: IEEE Spectrum — AI
  - title: AI reveals the invisible magnetic chaos wasting energy inside electric
      motors
    url: https://www.sciencedaily.com/releases/2026/05/260517211433.htm
    summary: "Electric vehicles are pushing scientists to tackle one of the biggest
      hidden energy drains inside electric motors: magnetic energy loss. Now,
      researchers in Japan have developed a powerful AI-driven physics model
      that can peer into the chaotic “maze-like” magnetic patterns inside motor
      materials and reveal how heat and microscopic magnetic structures trigger
      wasted energy."
    imageUrl: https://www.sciencedaily.com/images/1920/computational-model-identifies-origin-of-complex-magnetization-reversal-in-soft-magnets.webp
    categories: []
    publishedAt: 2026-05-18T04:02:36.000Z
    source: ScienceDaily — Engineering
