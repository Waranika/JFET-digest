      - Llms
      - Evolutionary-algorithm
    publishedAt: 2026-05-07T12:00:02.000Z
    source: IEEE Spectrum — AI
  - title: "Study: Firms often use automation to control certain workers’ wages"
    url: https://news.mit.edu/2026/study-firms-often-use-automation-control-certain-workers-wages-0507
    summary: When we hear about automation and artificial intelligence replacing
      jobs, it may seem like a tsunami of technology is going to wipe out
      workers broadly, in the name of greater efficiency. But a study
      co-authored by an MIT economist shows markedly different dynamics in the
      U.S. since 1980.
