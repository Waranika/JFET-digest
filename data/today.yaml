  - title: Studying Human Attitudes Towards Robots Through Experience
    url: https://spectrum.ieee.org/boston-dynamics-spot-interaction
    summary: Building the next generation of robots for successful integration into
      our homes, offices, and factories is more than just solving the hardware
      and software problems – we also need to understand how they will be
      perceived and how they can work effectively with people in those spaces.
    imageUrl: https://spectrum.ieee.org/media-library/families-watch-a-colorful-robotic-dog-demo-at-a-robotics-and-ai-institute-exhibit.jpg?id=65453180&width=1200&height=800&coordinates=62%2C0%2C63%2C0
