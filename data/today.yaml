  - title: 3D-printed interlocking electrodes demonstrate optimization potential for
      energy storage
    url: https://techxplore.com/news/2026-05-3d-interlocking-electrodes-optimization-potential.html
    summary: Good electrochemical energy storage (EES) devices such as rechargeable
      batteries and supercapacitors can store a lot of energy and release it
      quickly, but these design goals are often at odds with each other. Using
      design optimization and 3D printing, a team led by engineers and
      scientists at Lawrence Livermore National Laboratory (LLNL) has overcome
      this tradeoff and demonstrated a 3D-printed electrode design for EES that
      maximizes storage capacity under practical conditions.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/3d-printed-interlockin.jpg
