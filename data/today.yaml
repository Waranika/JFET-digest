    source: MIT Engineering
  - title: Wing-shape tests could unlock smoother water-to-air drone launches
    url: https://techxplore.com/news/2026-06-wing-smoother-air-drone.html
    summary: A bird bursting from the ocean or a mobula ray launching skyward makes
      the transition from water to air look effortless. For unmanned aerial
      vehicles (UAVs), commonly known as drones, it's one of the hardest
      maneuvers to replicate.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/ucf-researchers-are-st.jpg
    categories:
      - Robotics
    publishedAt: 2026-06-15T20:20:11.000Z
