  - title: A better way to turn 2D designs into 3D models for rapid prototyping
    url: https://news.mit.edu/2026/turning-2d-designs-into-3d-models-for-rapid-prototyping-0716
    summary: Engineers often use vision-language models to produce new designs, such
      as for airplane or automobile components. To simulate how those components
      will perform in realistic situations, they’ll use tried-and-true
      computer-aided design (CAD) software to generate 3D models of those
      designs, which they can put through virtual crash or durability tests.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/MIT-Geometric-Tuning-01-press.jpg?itok=y_aKzkkP
    categories: []
    publishedAt: 2026-07-16T04:00:00.000Z
    source: MIT Engineering
  - title: Can AI build a jet engine? JARVIS Challenge tests role of AI copilots in
      tough-tech engineering
    url: https://news.mit.edu/2026/can-ai-build-jet-engine-jarvis-challenge-tests-ai-copilots-in-tough-tech-engineering-0714
    summary: Artificial intelligence has rapidly transformed software engineering.
      Generative AI and large language models (LLMs) can create huge volumes of
      code and documentation; machine-learning algorithms can monitor
      performance and detect security vulnerabilities. But when the task is to
      conceive, design, and make a complex physical system such as a jet engine,
      are those AI tools equally transformative?
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/jarvis-competition-fired-engine-00.jpg?itok=fB5FluyQ
    categories: []
    publishedAt: 2026-07-14T18:00:00.000Z
    source: MIT Robotics
  - title: Alan Turing's biggest AI assumption may have been wrong
    url: https://www.sciencedaily.com/releases/2026/07/260713084850.htm
    summary: A new book claims AI has been built on a flawed assumption dating back
      to Alan Turing's famous 1950 paper. Peter J. Denning argues that the most
      important parts of human intelligence, including common sense, intuition,
      culture, and practical know-how, cannot be encoded into computers. He
      believes this makes true human-level AI impossible, regardless of how
      large language models become.
    imageUrl: https://www.sciencedaily.com/images/1920/human-vs-ai-brain-thinking-understanding.webp
    categories: []
    publishedAt: 2026-07-14T03:12:35.000Z
    source: ScienceDaily — Artificial Intelligence
  - title: Harvard scientists turn a silicon chip into a DNA writing machine
    url: https://www.sciencedaily.com/releases/2026/07/260708022202.htm
    summary: Scientists have created a silicon chip that can write dozens of DNA
      sequences simultaneously using electricity and water-based enzymes,
      offering a cleaner alternative to conventional DNA manufacturing. The
      breakthrough could eventually support portable DNA-writing devices and
      even massive DNA data storage, although new chemistry will be needed to
      scale the technology further.
    imageUrl: https://www.sciencedaily.com/images/1920/chip-dna-writer.webp
    categories: []
    publishedAt: 2026-07-09T02:48:06.000Z
    source: ScienceDaily — Computer Science
