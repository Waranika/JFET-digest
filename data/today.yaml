  - title: Chip Can Project Video the Size of a Grain of Sand
    url: https://spectrum.ieee.org/mems-photonics
    summary: By many estimates, quantum computers will need millions of qubits to
      realize their potential applications in cybersecurity, drug development,
      and other industries. The problem is, anyone who has wanted to
      simultaneously control millions of a certain kind of qubits has run into
      the problem of trying to control millions of laser beams.
    imageUrl: https://spectrum.ieee.org/media-library/an-array-of-tiny-metallic-cantilevers-curving-away-from-the-surface-of-a-photonic-chip.jpg?id=65493217&width=1245&height=700&coordinates=0%2C156%2C0%2C157
