  - title: Researchers break the 'memory wall' in large-scale AI training
    url: https://techxplore.com/news/2026-05-memory-wall-large-scale-ai.html
    summary: South Korean researchers have successfully developed a core technology
      that can fundamentally resolve "memory shortages," a chronic bottleneck in
      large-scale artificial intelligence (AI) training. This technology is a
      next-generation memory expansion technology based on Ethernet, which is
      expected to drive infrastructural innovation across the entire AI and big
      data industries in the future.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/etri-breaks-the-memory.jpg
