  - title: Perovskite/silicon tandem solar cells reach 32.89% certified efficiency
      with peak-selective passivation strategy
    url: https://techxplore.com/news/2026-05-perovskitesilicon-tandem-solar-cells-certified.html
    summary: A team of Chinese scientists has developed a new passivation strategy
      that significantly improves both the efficiency and operational stability
      of perovskite/silicon tandem solar cells. The study has been published in
      the journal Matter on May 21.
