  - title: What Anthropic’s Mythos Means for the Future of Cybersecurity
    url: https://spectrum.ieee.org/ai-cybersecurity-mythos
    summary: Two weeks ago, Anthropic announced that its new model, Claude Mythos
      Preview, can autonomously find and weaponize software vulnerabilities,
      turning them into working exploits without expert guidance. These were
      vulnerabilities in key software like operating systems and internet
      infrastructure that thousands of software developers working on those
      systems failed to find. This capability will have major security
      implications, compromising the devices and services we use every day. As a
      result, Anthropic is not releasing the model to the general public, but
      instead to a limited number of companies.
    imageUrl: https://spectrum.ieee.org/media-library/a-cgi-image-of-a-translucent-padlock-filled-with-0s-and-1s-one-spot-is-broken-and-the-numbers-are-spraying-out-of-that-spot.jpg?id=65714765&width=1245&height=700&coordinates=0%2C156%2C0%2C157
    categories:
