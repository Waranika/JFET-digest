  - title: New soft sensor can turn touch into robotic action without electronics
    url: https://techxplore.com/news/2026-07-soft-sensor-robotic-action-electronics.html
    summary: Built from flexible, compliant materials, soft robots are gaining
      relevance for tasks ranging from minimally invasive surgery to deep-sea
      exploration but remain held back by a fundamental constraint. To sense
      their surroundings and react, most soft robots rely on separate electronic
      sensors, signal-processing circuits and powered actuators, all coordinated
      by computers. This chain of components adds weight, complexity and points
      of failure, particularly in wet, hot or high-pressure settings where
      electronics are highly susceptible to disruption.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/nus-cde-researchers-de-8.jpg
    categories:
      - Robotics
    publishedAt: 2026-07-12T15:20:01.000Z
    source: TechXplore — Robotics
  - title: Physicists recreate black hole energy extraction in the lab
    url: https://www.sciencedaily.com/releases/2026/07/260711010120.htm
    summary: Researchers have recreated the physics of extracting energy from a
      spinning black hole using a stationary device that produces synthetic
      ultrafast rotation. The achievement transforms a long-standing theoretical
      idea into a practical experiment and could inspire new advances in optics,
      wireless communications, and quantum science.
    imageUrl: https://www.sciencedaily.com/images/1920/penrose-super-radiance-artwork.webp
    categories: []
    publishedAt: 2026-07-12T12:28:41.000Z
    source: ScienceDaily — Engineering
