    summary: New Zealand is a country famed for its dramatic landscapes, but its
      linguistic landscape is arguably just as interesting. Of its three
      official languages, only te reo Māori (the Māori language) could be
      described as indigenous. Though spoken fluently by just 4.3 percent of the
