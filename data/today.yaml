  - title: Hybrid AI model combines graphs and transformers for real-time traffic
      forecasts
    url: https://techxplore.com/news/2026-03-hybrid-ai-combines-graphs-real.html
    summary: Urban congestion is a big problem in our cities. It leads to commuter
      delays and economic inefficiency. More tragically, though, it leads to a
      million deaths annually worldwide. Research appearing in the International
      Journal of Reasoning-based Intelligent Systems shows how artificial
      intelligence (AI) might be able to carry out real-time traffic forecasting
      and provide a way for the authorities to manage our road networks better.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2025/ai-car.jpg
    categories:
      - Automotive
    publishedAt: 2026-03-17T19:20:01.000Z
