  - title: Why Are Large Language Models so Terrible at Video Games?
    url: https://spectrum.ieee.org/ai-video-games-llms-togelius
    summary: "Large language models (LLMs) have improved so quickly that the
      benchmarks themselves have evolved, adding more complex problems in an
      effort to challenge the latest models. Yet LLMs haven’t improved across
      all domains, and one task remains far outside their grasp: They have no
      idea how to play video games. While a few have managed to beat a few games
      (for example, Gemini 2.5 Pro beat Pokemon Blue in May of 2025), these
      exceptions prove the rule. The eventually victorious AI completed games
      far more slowly than a typical human player, made bizarre and often
      repetitive mistakes, and required custom software to guide their
      interactions with the game."
    imageUrl: https://spectrum.ieee.org/media-library/a-middle-aged-man-smiling-while-holding-a-video-game-controller-behind-him-is-a-bookshelf-filled-with-countless-cooperative-boa.jpg?id=65413486&width=1200&height=600&coordinates=0%2C625%2C0%2C625
    categories:
      - Llms
      - Artificial-intelligence
      - Video-games
    publishedAt: 2026-03-29T13:00:01.000Z
    source: IEEE Spectrum — AI
  - title: World's smallest QR code, smaller than bacteria, could store data for
      centuries
    url: https://www.sciencedaily.com/releases/2026/03/260328043603.htm
    summary: Scientists have created a microscopic QR code so tiny it can only be
      seen with an electron microscope—smaller than most bacteria and now
      officially a world record. But this isn’t just about size; it’s about
      durability. By engraving data into ultra-stable ceramic materials, the
      team has opened the door to storing information that could last for
      centuries or even millennia without needing power or maintenance.
    imageUrl: https://www.sciencedaily.com/images/1920/worlds-smallest-qr-code.webp
    categories: []
    publishedAt: 2026-03-29T05:07:10.000Z
    source: ScienceDaily — Computer Science
