  - title: “Cannot be explained” – New ultra stainless steel stuns researchers
    url: https://www.sciencedaily.com/releases/2026/05/260510030950.htm
    summary: A team at the University of Hong Kong has developed a new “super steel”
      that can survive the harsh conditions needed to make green hydrogen from
      seawater. The material uses an unexpected double-protection mechanism that
      resists corrosion far better than conventional stainless steel. Even more
      impressive, it could replace costly titanium parts used in today’s
      hydrogen systems.
