  - title: A new unit of measurement to honor an influential MIT alumnus
    url: https://news.mit.edu/2026/new-unit-of-measurement-honors-influential-mit-alumnus-0512
    summary: The hallowed history of student pranks (often known as hacks) at MIT
      includes the annual Baker House Piano Drop and the MIT weather balloon at
      the Harvard-Yale football game in 1982. One hack that has shown remarkable
      staying power in local lore is the 1958 measurement of the Massachusetts
      Ave. Bridge in “smoots,” a now accepted unit of meausrement named for the
      5-foot, 7-inch Oliver R. Smoot Jr. ’62. Then a first-year pledge at the
      Lambda Chi Alpha fraternity, Smoot famously laid down hundreds of times
      across the span one storied night as his peers painted markers across the
      bridge, totaling 364.4 smoots (plus 1 ear). Nearly 70 years later, the
      smoot markings remain.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202604/mit-meche-Dr-Klein-Project.jpg?itok=dY20P-IV
    categories: []
    publishedAt: 2026-05-12T21:15:00.000Z
    source: MIT Engineering
