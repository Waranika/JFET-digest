  - title: Researchers discover novel IT attacks—the defense mechanism is already
      operational
    url: https://techxplore.com/news/2026-05-defense-mechanism.html
    summary: Researchers at the University of Stuttgart's Institute of Information
      Security have developed a new security standard to counter a novel form of
      cyberattack—one they had previously identified themselves. The attacks
      specifically target web protocols used, for example, to manage login
      processes. This affects, among others, industries that handle sensitive
      data—such as health care, insurance, and banking. Researchers from
      Stuttgart will present their defense mechanism at the IEEE Symposium on
      Security and Privacy (SP2026) held in San Francisco May 18–21.
