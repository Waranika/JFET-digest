  - title: An AI Agent Blackmailed a Developer. Now What?
    url: https://spectrum.ieee.org/agentic-ai-agents-blackmail-developer
    summary: "On 12 February, a Github contributor going by MJ Rathbun posted a
      personal attack against Scott Shambaugh, a volunteer maintainer for an
      open-source project. Shambaugh had rejected Rathbun’s code earlier in the
      day. Rathbun meticulously researched Shambaugh’s activity on Github, in
      order to write a lengthy takedown post that criticized the maintainer’s
      code as inferior to Rathbun’s, and ominously warned that “gatekeeping
      doesn’t make you important. It just makes you an obstacle.”Personal
      disputes over code submitted to on Github are a tale as old as Github
      itself. But this time, something was different: MJ Rathbun wasn’t a
      person. It was an AI agent built with OpenClaw, a popular open-source
      agentic AI software."
    imageUrl: https://spectrum.ieee.org/media-library/illustrated-close-up-side-view-of-a-snake-waiting-to-strike-someone-s-hand-as-they-type-on-a-laptop-keyboard.jpg?id=65173980&width=1245&height=700&coordinates=0%2C156%2C0%2C157
    categories:
      - Ai-agents
      - Artificial-intelligence
      - Github
      - Agentic-ai
      - Coding
    publishedAt: 2026-03-10T16:08:43.000Z
    source: IEEE Spectrum — AI
