      - Ai-data-centers
      - Power-quality
      - Power-electronics
    publishedAt: 2026-04-29T14:00:01.000Z
    source: IEEE Spectrum — Computing & Chips
  - title: Can Biologists Rewrite the Genome’s Spaghetti Code?
    url: https://spectrum.ieee.org/synthetic-biology-ai-adrian-woolfson
    summary: "What if biology stopped being something we study and started becoming
      something we design? That’s the premise of Adrian Woolfson’s new book, On
      the Future of Species: Authoring Life by Means of Artificial Biological
      Intelligence, which published on 28 April from MIT Press. He argues that
      advances in AI and DNA synthesis are pushing biology toward an engineering
      paradigm—one in which scientists can generate new genetic sequences and
      eventually build organisms to order. He calls this emerging capability
      artificial biological intelligence, or ABI, a catchall term for systems
      that can design, construct, and ultimately “boot up” living things."
    imageUrl: https://spectrum.ieee.org/media-library/conceptual-illustration-of-neatly-plated-spaghetti-with-noodles-resembling-strands-of-dna.jpg?id=66647587&width=1245&height=700&coordinates=0%2C468%2C0%2C469
    categories:
      - Genome
      - Dna-sequencing
      - Evolution
      - Synthetic-biology
      - Bioengineering
      - Genetic-synthesis
    publishedAt: 2026-04-29T11:00:01.000Z
    source: IEEE Spectrum — AI
  - title: MIT engineers’ virtual violin produces realistic sounds
    url: https://news.mit.edu/2026/mit-engineers-virtual-violin-produces-realistic-sounds-0429
    summary: "There is no question that violin-making is an art form. It requires a
      musician’s ear, a craftsperson’s skill, and an historian’s appreciation of
      lessons learned over time. Making a violin also takes trust: Violin
      makers, or luthiers, often must wait until the instrument is finished
      before they can hear how all their hard work will sound."
