  - title: Is Optical Scale-Up Finally Approaching?
    url: https://spectrum.ieee.org/nvlink-fusion-optics
    summary: Currently, most data centers use both electronic and optical
      communication protocols, for different tasks. Scale-out networks connect
      thousands of AI computers across a data center, making optics the obvious
      choice for long distances. Scale-up networks connect several GPUs inside a
      single mega-computer or rack, where latency is critical, and dense copper
      interconnects, such as Nvidia’s NVLink, have long been the engineering
      solution of choice.
    imageUrl: https://spectrum.ieee.org/media-library/a-gpu-equipped-with-a-scale-up-interconnect.jpg?id=67114792&width=1245&height=700&coordinates=0%2C156%2C0%2C157
    categories:
      - Optical-networking
      - Data-centers
      - Nvidia
      - Gpu
    publishedAt: 2026-07-09T13:00:01.000Z
    source: IEEE Spectrum — Computing & Chips
  - title: Large Tabular Models Excel Where LLMs Fail
    url: https://spectrum.ieee.org/large-tabular-models-nexus
    summary: "The large language models (LLMs) that form the basis of generative AI
      chatbots such as ChatGPT, Claude, and Gemini can generate uncannily
      human-like text and images. But these models still struggle with a skill
      that, ironically, looks at face value to be right in their wheelhouse:
      analyzing structured data. A new type of generative AI is set to change
      this situation."
    imageUrl: https://spectrum.ieee.org/media-library/three-people-smiling-while-seated-on-a-couch-in-a-casual-office-environment.jpg?id=67114725&width=1245&height=700&coordinates=0%2C62%2C0%2C63
    categories:
      - Data-analytics
      - Llms
      - Foundation-models
      - Databases
    publishedAt: 2026-07-09T12:00:01.000Z
    source: IEEE Spectrum — AI
  - title: Harvard scientists turn a silicon chip into a DNA writing machine
    url: https://www.sciencedaily.com/releases/2026/07/260708022202.htm
    summary: Scientists have created a silicon chip that can write dozens of DNA
      sequences simultaneously using electricity and water-based enzymes,
      offering a cleaner alternative to conventional DNA manufacturing. The
      breakthrough could eventually support portable DNA-writing devices and
      even massive DNA data storage, although new chemistry will be needed to
      scale the technology further.
    imageUrl: https://www.sciencedaily.com/images/1920/chip-dna-writer.webp
    categories: []
    publishedAt: 2026-07-09T02:48:06.000Z
    source: ScienceDaily — Robotics
