    source: MIT Engineering
  - title: AI-powered spectrometer chip shrinks lab technology to the size of a
      grain of sand
    url: https://www.sciencedaily.com/releases/2026/05/260525000501.htm
    summary: A new AI-powered chip from UC Davis can analyze light and chemicals
      using a device tiny enough to fit almost anywhere. By combining smart
      silicon sensors with machine learning, it achieves lab-style spectral
      analysis without the bulky equipment.
    imageUrl: https://www.sciencedaily.com/images/1920/spectrometer-chip.webp
