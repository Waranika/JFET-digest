  - title: "'Reading the invisible': AI framework accounts for hidden defects in
      metal 3D printing"
    url: https://techxplore.com/news/2026-05-invisible-ai-framework-accounts-hidden.html
    summary: "Metal additive manufacturing (AM), widely regarded as a revolution in
      modern manufacturing for its ability to produce lightweight and
      geometrically complex components, has long faced a critical barrier to
      widespread adoption: microscopic internal defects that are invisible to
      the naked eye yet significantly compromise structural integrity."
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/reading-the-invisible.jpg
    categories:
      - Engineering
    publishedAt: 2026-05-15T16:00:06.000Z
    source: TechXplore — Engineering
  - title: NASA’s new AI space chip could let spacecraft think for themselves
    url: https://www.sciencedaily.com/releases/2026/05/260515002134.htm
    summary: NASA is testing a next-generation space computer chip that could give
      spacecraft the ability to operate far more independently in deep space.
      The radiation-hardened processor is showing performance levels hundreds of
      times beyond current spaceflight computers while surviving punishing tests
      designed to mimic the harsh conditions of space. The technology could
      enable AI-powered spacecraft, faster scientific discoveries, and smarter
      missions to the Moon and Mars.
    imageUrl: https://www.sciencedaily.com/images/1920/nasa-high-performance-spaceflight-computing-processor.webp
    categories: []
    publishedAt: 2026-05-15T08:13:15.000Z
    source: ScienceDaily — Computer Science
