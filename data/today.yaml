  - title: Researchers develop navigation system for underground rescue teams
    url: https://techxplore.com/news/2026-04-underground-teams.html
    summary: Operations underground, for example in underground stations, tunnels or
      mines, are risky and difficult for rescue teams. This is especially true
      if the technical infrastructure has collapsed due to explosions or fire,
      and there are no mobile phone signals, electricity, light, Wi-Fi or GNSS,
      while smoke, debris and damaged paths make orientation even more
      difficult.
