articles:
  - title: Why AI still can't beat a new video game
    url: https://techxplore.com/news/2026-03-ai-video-game.html
    summary: "For decades, video games have served as a proving ground for
      artificial intelligence. From early checkers programs to systems that
      conquered chess and Go, each milestone has seemed to bring machines closer
      to human-like intelligence. But a new paper by Julian Togelius and
      colleagues argues that this narrative is misleading. Despite impressive
      victories, today's AI still struggles with a deceptively simple challenge:
      playing a game it has never seen before."
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/video-game-controller.jpg
    categories:
      - Machine learning & AI
    publishedAt: 2026-03-29T17:00:06.000Z
    source: TechXplore — AI & Machine Learning
  - title: AI benchmark helps robots plan and complete their chores in the real world
    url: https://techxplore.com/news/2026-03-ai-benchmark-robots-chores-real.html
    summary: No matter how sophisticated they are, robots can often be indecisive
      and struggle with multi-step chores in the real world. For example, if you
      tell a robot to tidy a messy room, it might understand the goal but not
      know where to grab each object. It could even end up inventing steps. To
      address these common mistakes, Microsoft and a group of academics have
      developed an AI benchmark system to improve the accuracy of robot
      planning. The details of their work are published in a paper on the arXiv
      preprint server.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/new-benchmark-helps-ro.jpg
    categories:
      - Robotics
    publishedAt: 2026-03-29T15:30:02.000Z
    source: TechXplore — Robotics
  - title: AI is giving bad advice to flatter its users, says new study on dangers
      of overly agreeable chatbots
    url: https://techxplore.com/news/2026-03-ai-bad-advice-flatter-users.html
    summary: Artificial intelligence chatbots are so prone to flattering and
      validating their human users that they are giving bad advice that can
      damage relationships and reinforce harmful behaviors, according to a new
      study that explores the dangers of AI telling people what they want to
      hear.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/ai-is-giving-bad-advic-1.jpg
