  - title: Technology usually creates jobs for young, skilled workers. Will AI do
      the same?
    url: https://news.mit.edu/2026/technology-creates-jobs-young-skilled-workers-ai-0521
    summary: "At any given time, technology does two things to employment: It
      replaces traditional jobs, and it creates new lines of work. Machines
      replace farmers, but enable, say, aeronautical engineers to exist. So, if
      tech creates new jobs, who gets them? How well do they pay? How long do
      new jobs remain new, before they become just another common task any
      worker can do?"
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202605/MIT-NewWork-01-press.jpg?itok=byMeP8Rb
    categories: []
    publishedAt: 2026-05-21T04:00:00.000Z
    source: MIT Artificial Intelligence
