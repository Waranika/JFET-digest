  - title: What flocking birds can teach AI about reducing noise
    url: https://techxplore.com/news/2026-03-flocking-birds-ai-noise.html
    summary: Among the primary concerns surrounding artificial intelligence is its
      tendency to yield erroneous information when summarizing long documents.
      These "hallucinations" are problematic not only because they convey
      falsehoods, but also because they reduce efficiency—sorting through
      content to search for mistakes of AI outputs is time-consuming.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2022/flock-of-birds-1.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-03-17T05:00:01.000Z
    source: TechXplore — Computer Science
  - title: New model tests hundreds of MTA subway flood defenses in one minute
    url: https://techxplore.com/news/2026-03-hundreds-mta-subway-defenses-minute.html
    summary: As transit agencies face growing climate risks and limited capital
      budgets, deciding which flood protection measures to implement—and
      where—has become a critical challenge. Now, a research team at NYU Tandon
      School of Engineering has built a computer modeling framework that allows
      agencies to rapidly test and prioritize hundreds of subway resilience
      strategies for coastal storm surge flooding before committing to major
      infrastructure investments.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/supporting-the-mta-in.jpg
    categories:
      - Engineering
    publishedAt: 2026-03-16T23:30:10.000Z
    source: TechXplore — Engineering
  - title: With Nvidia Groq 3, the Era of AI Inference Is (Probably) Here
    url: https://spectrum.ieee.org/nvidia-groq-3
    summary: "This week, over 30,000 people are descending upon San Jose, Calif., to
      attend Nvidia GTC, the so-called Superbowl of AI—a nickname that may or
      may not have been coined by Nvidia. At the main event Jensen Huang, Nvidia
      CEO, took the stage to announce (among other things) a new line of next
      generation Vera Rubin chips that represent a first for the GPU giant: a
      chip designed specifically to handle AI inference. The Nvidia Groq 3
      language processing unit (LPU) incorporates intellectual property Nvidia
      licensed from the start-up Groq last Christmas Eve for US $20 billion."
    imageUrl: https://spectrum.ieee.org/media-library/a-man-in-all-black-presents-in-front-of-a-large-screen-which-compares-a-large-rectangular-chip-labelled-rubin-gpu-with-a-square.jpg?id=65298681&width=1245&height=700&coordinates=0%2C156%2C0%2C157
    categories:
      - Inferencing
      - Nvidia
      - Gpus
      - Processors
      - Ai
    publishedAt: 2026-03-16T21:04:33.000Z
    source: IEEE Spectrum — AI
  - title: 4D printing technology uses waste sulfur to enable self-actuating soft
      robots
    url: https://techxplore.com/news/2026-03-4d-technology-sulfur-enable-actuating.html
    summary: A joint research team led by Dr. Dong-Gyun Kim of the Korea Research
      Institute of Chemical Technology (KRICT), Professor Jeong Jae Wie of
      Hanyang University, and Professor Yong Seok Kim of Sejong University
      report the world's first 4D printing technology based on sulfur-rich
      polymers that respond to heat, light, and magnetic fields. The study was
      published in Advanced Materials.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/krict-worlds-first-4d-1.jpg
    categories:
      - Robotics
    publishedAt: 2026-03-16T20:10:01.000Z
    source: TechXplore — Robotics
  - title: A strange new quantum state appears when atoms get “frustrated”
    url: https://www.sciencedaily.com/releases/2026/03/260315225137.htm
    summary: Physicists at UC Santa Barbara have uncovered a new way to manipulate
      unusual magnetic states by exploiting “frustration” inside a crystal’s
      atomic structure. The team discovered a rare system where two different
      kinds of frustration—magnetic and electronic bond frustration—coexist and
      interact. By coupling these competing effects, researchers may be able to
      control exotic quantum states, potentially unlocking new ways to
      manipulate entangled spins for future quantum technologies.
    imageUrl: https://www.sciencedaily.com/images/1920/crystal-material-exotic-quantum-state.webp
    categories: []
    publishedAt: 2026-03-16T10:19:03.000Z
    source: ScienceDaily — Engineering
