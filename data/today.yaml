  - title: Inspired by armadillos, this soft robotic shell flips from flexible to
      fortress in an instant
    url: https://techxplore.com/news/2026-05-armadillos-soft-robotic-shell-flips.html
    summary: Researchers have drawn inspiration from armadillos to create a
      protective structure that responds to external threats by curling into a
      protective ball to protect electronic devices or other payloads. The
      structure is designed to automatically respond when it detects strain and
      can be tuned to respond to anything from a delicate touch to a significant
      impact.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/armadillos-inspire-new.jpg
    categories:
      - Engineering
    publishedAt: 2026-05-27T18:00:05.000Z
    source: TechXplore — Engineering
  - title: Junctionless Transistors Show a New Path to 3D Chips
    url: https://spectrum.ieee.org/3d-chips
    summary: Chipmakers are struggling to shrink the amount of area a transistor
      takes up, so researchers are trying to build layers of devices on top of
      each other. However, many experimental 3D chips rely on exotic materials
      and perform poorly compared with regular silicon devices. But researchers
      at the University of Illinois Urbana-Champaign have found a new way to
      build 3D circuits from silicon. The secret is a process that lets them
      roll multiple layers of nanometers-thin silicon onto a wafer at relatively
      low temperatures.
    imageUrl: https://spectrum.ieee.org/media-library/two-asian-mens-faces-reflected-in-a-silicon-wafer.jpg?id=66822290&width=1245&height=700&coordinates=0%2C156%2C0%2C157
    categories:
      - 3d-chips
      - Junctionless-transistors
      - 3d-integration
    publishedAt: 2026-05-27T15:00:02.000Z
    source: IEEE Spectrum — Computing & Chips
