  - title: Haptic insoles and forearm band improve balance by substituting lost
      foot-pressure feedback
    url: https://techxplore.com/news/2026-06-haptic-insoles-forearm-band-substituting.html
    summary: Misjudge a curb or miss a step on the stairs, and there is a split
      second of panic as your foot doesn't land when you expect it to. That
