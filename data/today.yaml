  - title: Automated camera solution can improve excavator tracking
    url: https://techxplore.com/news/2026-05-automated-camera-solution-excavator-tracking.html
    summary: Despite significant advances in vision-based equipment tracking,
      frequent occlusions caused by multiple interacting machines continue to
      degrade tracking accuracy on construction sites. While previous studies
      have explored multi-camera approaches, they often assume that at least one
      camera maintains a clear view at all times. In practice, however, such
      conditions are rarely guaranteed. Even with multiple CCTV systems
      installed, simultaneous occlusions across cameras frequently occur, making
      it difficult to identify which camera provides the most reliable view at
      any given moment.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/incheon-national-unive-1.jpg
    categories:
      - Engineering
    publishedAt: 2026-05-01T17:20:01.000Z
    source: TechXplore — Engineering
  - title: Computer vision helps observers understand how iconic artworks were created
    url: https://techxplore.com/news/2026-05-vision-iconic-artworks.html
    summary: Paintings are often made up of thousands of tiny brushstrokes, each
      going in a certain direction, that are not easily observed by the viewer.
      A cross-disciplinary research team from the Penn State College of
      Information Sciences and Technology (IST) and Loughborough University in
      England has developed an image analysis method that helps to make the
      underlying brushstroke structure of paintings visible, giving new insight
      into how artists physically created their works.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/computer-vision-helps.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-05-01T17:00:03.000Z
    source: TechXplore — Computer Science
