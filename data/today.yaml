  - title: Co-designed robots reveal what health care staff and patients actually need
    url: https://techxplore.com/news/2026-05-robots-reveal-health-staff-patients.html
    summary: As robots enter hospitals and care facilities, questions remain about
      whether they actually make care easier for the people who give and receive
      it. A new Cornell Tech-led study approaches that challenge by inviting
      health care workers, long-term care residents, and community members to
      help design the robots themselves.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/new-approach-designs-h.jpg
