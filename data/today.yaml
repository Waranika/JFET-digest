    publishedAt: 2026-07-17T18:00:01.000Z
    source: IEEE Spectrum — Robotics
  - title: Scientists built a camera that can track invisible particles in 3D
    url: https://www.sciencedaily.com/releases/2026/07/260716023610.htm
    summary: A new particle detector called PLATON could replace millions of tiny
      detector components with a single block of light-producing material. Using
      a light-field camera, highly sensitive photon sensors, and AI, it
      reconstructs particle paths in fast, detailed 3D. Simulations suggest it
      could match or surpass today’s best detectors while being far easier to
      scale. The technology may also lead to sharper PET medical scans.
    imageUrl: https://www.sciencedaily.com/images/1920/neutrinos-interaction-camera.webp
    categories: []
    publishedAt: 2026-07-17T06:04:57.000Z
    source: ScienceDaily — Engineering
  - title: Can AI build a jet engine? JARVIS Challenge tests role of AI copilots in
      tough-tech engineering
    url: https://news.mit.edu/2026/can-ai-build-jet-engine-jarvis-challenge-tests-ai-copilots-in-tough-tech-engineering-0714
    summary: Artificial intelligence has rapidly transformed software engineering.
      Generative AI and large language models (LLMs) can create huge volumes of
      code and documentation; machine-learning algorithms can monitor
      performance and detect security vulnerabilities. But when the task is to
      conceive, design, and make a complex physical system such as a jet engine,
      are those AI tools equally transformative?
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/jarvis-competition-fired-engine-00.jpg?itok=fB5FluyQ
    categories: []
    publishedAt: 2026-07-14T18:00:00.000Z
    source: MIT Robotics
  - title: Make an Origami Circuit Board
    url: https://spectrum.ieee.org/origami-circuit-boards
    summary: What could you do if you could make a circuit trace by just bending a
      piece of paper? How about bridging modern technologies and traditional
      handicrafts while providing opportunities for learning skills in both.
    imageUrl: https://spectrum.ieee.org/media-library/a-selection-of-papercraft-objects-including-a-snowflake-with-leds-an-aeroplane-and-helicopter-with-lights-and-motorized-propel.png?id=66989986&width=2000&height=1500&coordinates=0%2C282%2C0%2C282
