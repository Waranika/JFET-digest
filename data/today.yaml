  - title: This AI knew the answers but didn’t understand the questions
    url: https://www.sciencedaily.com/releases/2026/04/260429102035.htm
    summary: For decades, psychologists have debated whether the human mind can be
      explained by one unified theory or must be broken into separate parts like
      memory and attention. A recent AI model called Centaur seemed to offer a
      breakthrough, claiming it could mimic human thinking across 160 different
      cognitive tasks. But new research is challenging that bold claim,
      suggesting the model isn’t truly “thinking” at all—it’s just memorizing
      patterns.
    imageUrl: https://www.sciencedaily.com/images/1920/human-vs-ai-brain-thinking-understanding.webp
    categories: []
    publishedAt: 2026-04-30T06:44:03.000Z
    source: ScienceDaily — Artificial Intelligence
  - title: With a swipe of a magnet, microscopic “magno-bots” perform complex
      maneuvers
    url: https://news.mit.edu/2026/microscopic-magno-bots-perform-complex-maneuvers-with-magnet-swipe-0428
    summary: Under a microscope, a bouquet of lollipop-like structures, each smaller
      than a grain of sand, waves gently in a petri dish of liquid. Suddenly,
      they snap together, like the jaws of a Venus flytrap, as a scientist waves
      a small magnet over the dish. What was previously an assemblage of tiny
      passive structures has transformed instantly into an active robotic
      gripper.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202604/MIT-Mini-MagnoBot-01-press.jpg?itok=Ob5IT48P
    categories: []
    publishedAt: 2026-04-28T15:00:00.000Z
    source: MIT Robotics
  - title: Reviving Teletext for Ham Radio
    url: https://spectrum.ieee.org/reviving-teletext-for-ham-radio
    summary: Once upon a time in Europe, television remote controls had a magic
      teletext button. Years before the internet stole into homes, pressing that
      button brought up teletext digital information services with hundreds of
      constantly updated pages. Living in Ireland in the 1980s and ’90s, my
      family accessed the national teletext service—Aertel—multiple times a day
      for weather and news bulletins, as well as things like TV program guides
      and updates on airport flight arrivals.
    imageUrl: https://spectrum.ieee.org/media-library/a-personal-computer-displays-a-blocky-computer-graphic-depicting-a-city-skyline-with-the-words-cq-cq-cq-de-kb1wnr-in-front-of.png?id=65575350&width=2000&height=1500&coordinates=0%2C197%2C0%2C198
    categories:
