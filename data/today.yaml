  - title: How Musicians Can Get Paid for Training AI
    url: https://spectrum.ieee.org/ai-music-attribution
    summary: "Musicians are accustomed to getting paid each time their creative work
      is used. Across vinyl/CD sales, streams, radio, cover versions, and those
      numerous niches like karaoke, there are agreements in place about what
      “use” means. Underlying this is a simple economic principle: The more
      something is used, the more money it makes."
    imageUrl: https://spectrum.ieee.org/media-library/conceptual-illustration-of-two-quarter-note-stems-going-through-an-s-resembling-a-dollar-sign.jpg?id=66750724&width=1245&height=700&coordinates=0%2C187%2C0%2C188
