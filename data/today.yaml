  - title: Found Industries aims to strengthen America’s industrial supply chains
    url: https://news.mit.edu/2026/found-industries-aims-to-strengthen-americas-industrial-supply-chains-0503
    summary: Found Industries has gone through several distinct phases in the four
      years since it was originally formed as Found Energy. There was the
      scrappy startup stage, in which the company was primarily housed in the
      basement of founder Peter Godart ’15, SM ’19, PhD ’21. Then there was the
      demonstration phase, in which the company worked to productize its
