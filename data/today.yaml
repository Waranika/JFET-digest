  - title: Manchester Code Made Bits Behave
    url: https://spectrum.ieee.org/manchester-code-ieee-milestone
    summary: In the late 1940s—when computer engineers were grappling with
      unreliable hardware and noisy transmission environments—a team of
      engineers inside a modest lab at the University of Manchester, England,
      confronted a problem so fundamental that it threatened the viability of
      digital computing itself. Machines could generate bits, but they could not
      reliably read them back.
    imageUrl: https://spectrum.ieee.org/media-library/black-and-white-photograph-of-a-well-dressed-young-man-working-on-a-magnetic-drum-store-in-a-lab.jpg?id=66734376&width=1245&height=700&coordinates=0%2C120%2C0%2C121
