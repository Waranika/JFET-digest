  - title: Cell phone-based maps could reshape city planning, from bus schedules to
      traffic hotspots
    url: https://techxplore.com/news/2026-04-cell-based-reshape-city-bus.html
    summary: Understanding how people use the spaces they inhabit—where they live,
      work, and gather—is key to effective urban planning that meets their
      needs. For example, knowing which routes are most commonly used to travel
      from residential neighborhoods to workplaces, and during which time
      periods, makes it possible to adjust bus routes and frequencies, and to
      optimize traffic control resources. Identifying meeting, leisure, and
      event spaces, as well as the time periods when crowds are largest, is
      useful not only for keeping the public informed, but also for
      strengthening cleaning and transportation services and developing
      promotional strategies. The more accurate this information is, the more it
      will help public administrations to plan urban space and services in
      effective and realistic ways.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/a-tool-based-on-cell-p.jpg
    categories:
      - Engineering
    publishedAt: 2026-04-28T21:40:07.000Z
    source: TechXplore — Engineering
  - title: Can AI quantify beauty? New study suggests it can't
    url: https://techxplore.com/news/2026-04-ai-quantify-beauty.html
    summary: Attempts to define human beauty using artificial intelligence may
      reveal more about bias in data than universal standards, according to a
      new analysis from the University of Virginia's School of Data Science.
      Using computer vision and statistical modeling, researchers evaluated
      whether facial features align with the "Golden Ratio," a mathematical
      formula often cited as an objective measure of attractiveness. Instead,
      the analysis found that demographic variation, not mathematical
      proportion, was the strongest factor shaping model outputs. This
      challenges long-standing assumptions that beauty can be quantified.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/statue-of-venus.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-04-28T21:00:04.000Z
    source: TechXplore — Computer Science
