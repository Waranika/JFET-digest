  - title: Wind-powered robot could enable long-term exploration of hostile
      environments
    url: https://techxplore.com/news/2026-03-powered-robot-enable-term-exploration.html
    summary: Researchers at Cranfield University have created WANDER-bot, a
      low-cost, 3D-printed robot that is powered by wind energy. Designed to
      spend long durations in hostile, windy environments such as certain
      deserts, polar regions or even other planets, WANDER-bot doesn't need a
      battery to power movement, enabling longer operations without having to
      pause and recharge.
