  - title: US government ramps up mass surveillance with help of AI tech, data
      brokers, and your apps and devices
    url: https://techxplore.com/news/2026-04-ramps-mass-surveillance-ai-tech.html
    summary: On a Saturday morning, you head to the hardware store. Your neighbors'
      Ring cameras film your walk to the car. Your car's sensors, cameras and
      microphones record your speed, how you drive, where you're going, who's
      with you, what you say, and biological metrics such as facial expression,
      weight and heart rate. Your car may also collect text messages and
      contacts from your connected smartphone.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2024/surveillance.jpg
    categories:
      - Consumer & Gadgets
    publishedAt: 2026-04-22T01:20:02.000Z
    source: TechXplore — AI & Machine Learning
  - title: New study bridges the worlds of classical and quantum physics
    url: https://news.mit.edu/2026/new-study-bridges-classical-and-quantum-physics-0421
    summary: When you throw a ball in the air, the equations of classical physics
      will tell you exactly what path the ball will take as it falls, and when
      and where it will land. But if you were to squeeze that same ball down to
      the size of an atom or smaller, it would behave in ways beyond anything
      that classical physics can predict.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202604/MIT-QuantumBridge-01-press.jpg?itok=MbjLXnQO
    categories: []
    publishedAt: 2026-04-21T23:05:00.000Z
    source: MIT Engineering
  - title: Tackling the housing shortage with robotic microfactories
    url: https://news.mit.edu/2026/tackling-housing-shortage-robotic-microfactories-0421
    summary: A national housing shortage is straining finances and communities
      across the United States. In Massachusetts, at least 222,000 homes will
      have to be built in the next 10 years to meet the population's needs. At
      the same time, there are numerous challenges in traditional construction.
      There's a shortage of skilled construction workers. Most projects involve
      multiple contractors and subcontractors, adding complexity and lag time.
      And the construction process, as well as the buildings themselves, can be
      a major source of emissions that contribute to climate change.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202604/mit-system-design.jpg?itok=H2Sm6ipG
    categories: []
    publishedAt: 2026-04-21T21:45:00.000Z
    source: MIT Robotics
  - title: Tiny 'light-concentrating' particles boost terahertz technology, study
      shows
    url: https://techxplore.com/news/2026-04-tiny-particles-boost-terahertz-technology.html
    summary: Scientists have found a way to boost terahertz technology using
      particles thousands of times smaller than a grain of sand. Research
      published in Scientific Reports by Loughborough University's Emergent
      Photonics Research Center shows how a sparse layer of nanoparticles can
      make materials that produce terahertz radiation more efficient.
