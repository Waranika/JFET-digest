  - title: Generative AI improves a wireless vision system that sees through
      obstructions
    url: https://news.mit.edu/2026/generative-ai-improves-wireless-vision-system-sees-through-obstructions-0319
    summary: MIT researchers have spent more than a decade studying techniques that
      enable robots to find and manipulate hidden objects by “seeing” through
      obstacles. Their methods utilize surface-penetrating wireless signals that
      reflect off concealed items.
