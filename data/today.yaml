  - title: Following the questions where they lead
    url: https://news.mit.edu/2026/following-questions-where-they-lead-bailey-flanigan-0717
    summary: Ever since she was a child playing on her family’s farmland in
      Wisconsin, Bailey Flanigan was guided by her own selective, yet
      wide-ranging, curiosity. Describing her young self as spirited and a bit
      unruly, she directed her energies to everything from building booby traps
      to doing experimental construction projects to exploring an intense
      interest in medicine to writing fiction and music to planning nonprofit
      organizations to help lessen social inequality.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/mit-lids-Bailey-Flanigan.jpg?itok=DtZFVT8B
    categories: []
