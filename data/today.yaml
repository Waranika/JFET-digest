  - title: Attitudes toward autonomous service robots at real-life events reveal
      social behaviors
    url: https://techxplore.com/news/2026-07-attitudes-autonomous-robots-real-life.html
    summary: When a robot offers you candy, it is hard not to be curious. In an
      experiment conducted by ethologists at ELTE, visitors at public events
      noticed an autonomous service robot more often than a human server, and
      the candy on the robot's tray disappeared faster. The study also suggests
      that the presence of robots may influence the way people behave in social
      situations.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/elte-ethologists-servi.jpg
    categories:
      - Consumer & Gadgets
    publishedAt: 2026-07-22T18:40:01.000Z
    source: TechXplore — Robotics
  - title: The Computer That Helped Win World War II
    url: https://spectrum.ieee.org/colossus-computer-ieee-milestone
    summary: One summer day in 1941, a British radio operator was monitoring German
      military frequencies and heard something unexpected in her headphones. A
      later report called it “strange new music.” Sounding unlike the familiar
      Morse dit-dit-dah of enciphered messages sent over the German Enigma
      network, the “new music” was a rhythmic warble of binary teletype code
      being transmitted at high speed.
    imageUrl: https://spectrum.ieee.org/media-library/black-and-white-image-of-two-women-operating-a-wall-sized-1940s-computer.jpg?id=67520993&width=1200&height=800&coordinates=62%2C0%2C63%2C0
    categories:
      - Type-ti
      - Ieee-history
      - Ieee-milestone
      - Computing
      - Encryption
      - Colossus
    publishedAt: 2026-07-22T18:00:01.000Z
    source: IEEE Spectrum — Computing & Chips
  - title: Exploring a smarter way to build climate-resilient roads
    url: https://techxplore.com/news/2026-07-exploring-smarter-climate-resilient-roads.html
    summary: Every year from June to September, India experiences the monsoon
      season. While the visible heavy rainfall often takes the blame for many
      roads requiring repairs much sooner than expected, a far less visible yet
      critical force is at play long before the first raindrop falls on the
      road.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/damaged-road.jpg
    categories:
      - Engineering
    publishedAt: 2026-07-22T17:20:07.000Z
    source: TechXplore — Engineering
  - title: Professor Emeritus Dimitri Bertsekas, influential computer scientist and
      prolific author, dies at 83
    url: https://news.mit.edu/2026/dimitri-bertsekas-influential-computer-scientist-prolific-author-dies-0722
    summary: Dimitri Bertsekas PhD ’71, the Jerry McAfee (1940) Emeritus Professor
      in Engineering in the Department of Electrical Engineering and Computer
      Science (EECS), a principal investigator in the Laboratory for Information
      and Decision Systems (LIDS), and the Fulton Professor of Computational
      Decision Making at Arizona State University, died on June 3 at his home in
      Belmont, Massachusetts. He was 83 years old.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/mit-lids-Bertsekas-obit.jpg?itok=a4V9w4Hq
    categories: []
    publishedAt: 2026-07-22T17:00:00.000Z
    source: MIT Artificial Intelligence
  - title: Graphics advances preserve stretched textures and cut shape-computation
      costs tenfold
    url: https://techxplore.com/news/2026-07-graphics-advances-textures-tenfold.html
    summary: Researchers from the Institute of Science and Technology Austria (ISTA)
      presented two papers at SIGGRAPH in Los Angeles. One paper introduces new
      methods for texturing highly deformable surfaces, and the other proposes a
      faster, more precise way to compute geometric properties of shapes. Both
      show how to boost graphics accuracy while cutting computational cost, with
      potential applications across video gaming, visual effects and simulation.
      The studies have been published in ACM Transactions on Graphics.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/new-computer-graphics-3.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-07-22T15:20:01.000Z
    source: TechXplore — Computer Science
  - title: MIT’s new lidar chip could give self-driving cars a wider view
    url: https://www.sciencedaily.com/releases/2026/07/260722032127.htm
    summary: MIT engineers have found a way to give chip-based lidar a wider,
      clearer view without relying on moving parts. Their design uses
      differently shaped antennas that can sit close together without scrambling
      one another’s signals. In tests, the system sharply reduced interference
      while steering a single precise beam across a broad field of view.
    imageUrl: https://www.sciencedaily.com/images/1920/mit-array-of-integrated-antennas.webp
    categories: []
    publishedAt: 2026-07-22T10:00:54.000Z
    source: ScienceDaily — Computer Science
  - title: Why AI Needs a “Genie Coefficient”
    url: https://spectrum.ieee.org/ai-agent-benchmark
    summary: "Major benchmarks measure what AI can do. None measure whether it does
      what you mean: the distance between what you ask an AI to do and the
      unspoken assumptions about how you want the AI to do it. We propose a new
      metric: the Genie coefficient."
    imageUrl: https://spectrum.ieee.org/media-library/cartoon-digital-genie-emerging-from-a-smartphone-towering-over-a-surprised-user.png?id=67508222&width=1245&height=700&coordinates=0%2C104%2C0%2C104
    categories:
      - Agentic-ai
      - Ai-agents
      - Alignment
      - Ai-safety
      - User-experience
      - Ai-benchmarks
    publishedAt: 2026-07-21T17:41:11.000Z
    source: IEEE Spectrum — AI
  - title: MIT honors employees with 2026 Excellence Awards, Collier Medal, and
      Staff Award for Distinction in Service
    url: https://news.mit.edu/2026/mit-honors-employees-excellence-awards-collier-medal-staff-award-distinction-service-0721
    summary: On June 4, colleagues held homemade signs, waved pompoms, and cheered
      loudly for award recipients in Kresge Auditorium. Twenty individuals and
      three teams received MIT Excellence Awards — the Institute’s highest honor
      for staff. Additional honors included the Collier Medal, the Staff Award
      for Distinction in Service, and the Gordon Y. Billard Award.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/mit-staff-Collier-Medal-Michael-Grenier.jpg?itok=LmIc8BO9
    categories: []
    publishedAt: 2026-07-21T12:00:00.000Z
    source: MIT Engineering
  - title: New AI blood test predicts heart disease 15 years early
    url: https://www.sciencedaily.com/releases/2026/07/260716023603.htm
    summary: A new AI-powered blood test could give people a remarkably early
      warning of serious heart and circulation problems. Developed by
      researchers at the University of Hong Kong, CardiOmicScore analyzes
      thousands of proteins and metabolites to estimate the risk of six major
      cardiovascular diseases, including heart attack, stroke, heart failure,
      and atrial fibrillation. Unlike genetic risk scores, which remain fixed
      throughout life, the system captures biological changes linked to a
      person’s current health, lifestyle, and environment.
    imageUrl: https://www.sciencedaily.com/images/1920/ai-cardiology.webp
    categories: []
    publishedAt: 2026-07-19T14:58:00.000Z
    source: ScienceDaily — Robotics
  - title: This Graduate Student Equips NASA’s Robots With Assembly Skills
    url: https://spectrum.ieee.org/graduate-student-nasas-robots-assembly
    summary: Like many engineers, Sarah Downs says she knew she wanted to pursue a
      STEM career from a young age. As a teenager, she discovered robotics
      through her Tulsa, Okla., middle school’s First Lego League team, and she
      fell in love with the field, she says. Downs participated in the
      international robotics program from 2014 to 2016.
    imageUrl: https://spectrum.ieee.org/media-library/a-young-woman-with-blonde-hair-softly-smiling-next-to-a-pair-of-collaborative-robot-arms.jpg?id=67499761&width=1245&height=700&coordinates=0%2C156%2C0%2C157
    categories:
