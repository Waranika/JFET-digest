  - title: New “optical tornado” technology could transform quantum communication
    url: https://www.sciencedaily.com/releases/2026/04/260424233215.htm
    summary: Scientists have created tiny “optical tornadoes” — swirling beams of
      light that twist like miniature whirlwinds — using a surprisingly simple
      setup based on liquid crystals. Instead of relying on complex
      nanotechnology, the team used self-organizing structures called torons to
      trap and manipulate light, causing it to spiral and rotate in intricate
      ways. Even more impressively, they achieved this effect in light’s most
      stable, lowest-energy state, making it far easier to generate laser-like
      beams with these unusual properties.
    imageUrl: https://www.sciencedaily.com/images/1920/network-of-torons.webp
    categories: []
    publishedAt: 2026-04-25T15:27:49.000Z
    source: ScienceDaily — Engineering
