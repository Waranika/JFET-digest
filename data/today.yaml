  - title: "GoZTASP: A Zero-Trust Platform for Governing Autonomous Systems at
      Mission Scale"
    url: https://content.knowledgehub.wiley.com/goztasp-a-zero-trust-platform-for-governing-autonomous-systems-at-mission-scale/
    summary: ZTASP is a mission-scale assurance and governance platform designed for
      autonomous systems operating in real-world environments. It integrates
      heterogeneous systems—including drones, robots, sensors, and human
      operators—into a unified zero-trust architecture. Through Secure Runtime
      Assurance (SRTA) and Secure Spatio-Temporal Reasoning (SSTR), ZTASP
      continuously verifies system integrity, enforces safety constraints, and
      enables resilient operation even under degraded conditions.
    imageUrl: https://spectrum.ieee.org/media-library/technology-innovation-institute-logo-with-stylized-tii-and-curved-line.png?id=65498963&width=980
    categories:
