  - title: A new robotic hand capable of switching between multiple grippers using a
      single motor
    url: https://techxplore.com/news/2026-07-robotic-capable-multiple-grippers-motor.html
    summary: For robots to be used in various settings, such as factories,
      logistics, service industries and households, they must be able to stably
      handle a diverse range of objects differing in shape, size, weight and
      rigidity. However, conventional robotic hands often require multiple
      motors and complex control systems, presenting challenges in terms of
      weight, cost, failure risk and control difficulties.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/a-new-robotic-hand-cap.jpg
    categories:
      - Robotics
    publishedAt: 2026-07-17T14:00:10.000Z
    source: TechXplore — Robotics
  - title: Scientists built a camera that can track invisible particles in 3D
    url: https://www.sciencedaily.com/releases/2026/07/260716023610.htm
    summary: A new particle detector called PLATON could replace millions of tiny
      detector components with a single block of light-producing material. Using
      a light-field camera, highly sensitive photon sensors, and AI, it
      reconstructs particle paths in fast, detailed 3D. Simulations suggest it
      could match or surpass today’s best detectors while being far easier to
      scale. The technology may also lead to sharper PET medical scans.
    imageUrl: https://www.sciencedaily.com/images/1920/neutrinos-interaction-camera.webp
    categories: []
    publishedAt: 2026-07-17T06:04:57.000Z
    source: ScienceDaily — Engineering
  - title: How to Make an Invisible Drone
    url: https://spectrum.ieee.org/invisible-spinning-drone
    summary: "There are many words that I would never, ever use to describe a drone.
      Stealthy. Subtle. Whatever the opposite of obnoxious is. Much of this is
      because of the giant angry bee sound that drones tend to make, but it’s
      also the way that they look in flight: With uncannily linear movements and
      an even less canny ability to hover perfectly still, they tend to draw the
      eye as affronts to nature."
    imageUrl: https://spectrum.ieee.org/media-library/low-visibility-drone-flying-in-front-of-an-office-plant.jpg?id=67480624&width=1245&height=700&coordinates=0%2C62%2C0%2C63
