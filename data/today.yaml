  - title: Artificial muscle merges sensing and movement in one structure for
      humanoid robots
    url: https://techxplore.com/news/2026-05-artificial-muscle-merges-movement-humanoid.html
    summary: A research team has developed an "intelligent artificial muscle"
      capable of simultaneously performing sensing and actuation functions,
      inspired by biological muscle–tendon complexes. This artificial muscle,
      which embeds liquid metal channels within a liquid crystal elastomer
      (LCE), contracts in response to electrical stimulation while also being
      able to measure internal force and length in real time.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/snu-researchers-develo-10.jpg
    categories:
      - Robotics
    publishedAt: 2026-05-11T00:30:01.000Z
