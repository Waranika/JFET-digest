  - title: An AI model that thinks like we do offers new ways to peer inside the
      black box
    url: https://techxplore.com/news/2026-06-ai-ways-peer-black.html
    summary: When a standard large language model (LLM) is confronted with a
      problem, it tries to solve it by matching it to similar information it has
      seen before, and then give an answer based on those past patterns. But how
      it decides which information to use and what value it gives to different
      pieces of information can be somewhat inscrutable from the outside. An
      EPFL team has created a new large language model that is structured
      similarly to a human brain, allowing users more control and moving away
      from "black box" AI.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/researchers-create-an.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-06-26T16:20:03.000Z
    source: TechXplore — Computer Science
