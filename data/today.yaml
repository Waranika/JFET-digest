  - title: The First Chatbot’s Multiple Personalities
    url: https://spectrum.ieee.org/eliza-chatbot-source-code
    summary: ELIZA is remembered as the world’s first AI star, a kindly therapist in
      chatbot form that gently probed users’ worries. Even its creator, Joseph
      Weizenbaum, was surprised by the warm reception given to his experiment in
      human-machine interaction. For some, it heralded an age of automated
      psychotherapy, while others believed the program demonstrated sentience, a
      fallacy soon known as the “ELIZA effect.” Based on published descriptions,
      ELIZA has been implemented on many different computers, but only recently
      has the actual source code been unearthed from MIT’s archives.
    imageUrl: https://spectrum.ieee.org/media-library/photo-collage-of-a-charismatic-elderly-man-raising-his-eyebrows-against-a-background-of-obscured-computer-programming-script.jpg?id=67155632&width=1245&height=700&coordinates=0%2C0%2C0%2C0
    categories:
      - Chatbots
      - Ai
      - History
      - Eliza
      - Joseph-weizenbaum
    publishedAt: 2026-07-15T15:35:53.000Z
    source: IEEE Spectrum — AI
  - title: Can AI build a jet engine? JARVIS Challenge tests role of AI copilots in
      tough-tech engineering
    url: https://news.mit.edu/2026/can-ai-build-jet-engine-jarvis-challenge-tests-ai-copilots-in-tough-tech-engineering-0714
    summary: Artificial intelligence has rapidly transformed software engineering.
      Generative AI and large language models (LLMs) can create huge volumes of
      code and documentation; machine-learning algorithms can monitor
      performance and detect security vulnerabilities. But when the task is to
      conceive, design, and make a complex physical system such as a jet engine,
      are those AI tools equally transformative?
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/jarvis-competition-fired-engine-00.jpg?itok=fB5FluyQ
    categories: []
    publishedAt: 2026-07-14T18:00:00.000Z
    source: MIT Robotics
  - title: How I Turned AI to the Dark Side
    url: https://spectrum.ieee.org/jailbreaking-llms
    summary: On a fine bright afternoon last fall, my colleague Matthew
      Gore-Kormanik (or Zigula, as he prefers to be known) and I decided to
      unwind with a game of Fortnite. In the game, we were strolling along with
      the infamous Sith lord Darth Vader, chatting about this and that. Darth
      seemed in a good mood, and soon enough he was spilling all his dark evil
      secrets. He gave us detailed instructions on how to count blackjack cards
      at a casino and what the steps are to producing napalm.
    imageUrl: https://spectrum.ieee.org/media-library/glossy-red-robot-devil-standing-on-a-bundle-of-dynamite-against-blue-glow-background.png?id=67163741&width=1200&height=800&coordinates=0%2C583%2C0%2C584
    categories:
