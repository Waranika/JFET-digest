  - title: Grounded in reality, new AI model spots fake images with less training
    url: https://techxplore.com/news/2026-06-grounded-reality-ai-fake-images.html
    summary: Artificial intelligence (AI)-generated images have become increasingly
      more sophisticated than early ones that showed humans with more than five
      fingers on a hand, making it even harder to determine whether photos are
      authentic. Now, a team of computer scientists in the McKelvey School of
      Engineering at Washington University in St. Louis has developed a model
      that can detect fake images by learning which are real.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/model-uses-real-image.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-06-05T17:00:06.000Z
