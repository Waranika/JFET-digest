  - title: What Makes a Job Dull, Dirty, or Dangerous?
    url: https://spectrum.ieee.org/dull-dirty-dangerous-robots
    summary: For years, the field of robotics has used the terms “dull, dirty, and
      dangerous” (DDD) to describe the types of tasks or jobs where robots might
      be useful—by doing work that’s undesirable for people. A classic example
      of a DDD job is one of “repetitive physical labor on a steaming hot
      factory floor involving heavy machinery that threatens life and limb.”
    imageUrl: https://spectrum.ieee.org/media-library/a-curbside-trash-can-being-lifted-by-a-mechanical-arm-attached-to-the-side-of-a-garbage-truck.jpg?id=66736070&width=1245&height=700&coordinates=0%2C178%2C0%2C178
