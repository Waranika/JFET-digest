  - title: "Bubble trouble: Hydrogen research highlights outsized impacts of tiny
      bubbles in water electrolysis"
    url: https://techxplore.com/news/2026-04-hydrogen-highlights-outsized-impacts-tiny.html
    summary: "Hydrogen is often described as the fuel of the future—a clean,
