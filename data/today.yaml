  - title: Finding a nanoscale solution to safer spaceflight
    url: https://news.mit.edu/2026/palak-patel-finding-nanoscale-solution-safer-spaceflight-0311
    summary: “I’ve loved space for as long as I can remember,” says Palak Patel, a
      sixth-year doctoral student in MIT’s Department of Mechanical Engineering
      (MechE). As a girl, she “devoured” books about planets in the solar
      system, and her parents nurtured her growing interest in space through
      visits to observatories, air and space museums, and NASA centers. Spending
      time with her grandfather, who oversaw the radiation protection division
      of India’s Bhabha Atomic Research Center, also made a big impression on
      her.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202602/mit-Palak-Patel.JPG?itok=DEAiGcvh
    categories: []
    publishedAt: 2026-03-11T04:00:00.000Z
    source: MIT Engineering
  - title: Scientists turn scrap car aluminum into high-performance metal for new
      vehicles
    url: https://www.sciencedaily.com/releases/2026/03/260309225217.htm
    summary: Scientists at Oak Ridge National Laboratory have created a new aluminum
      alloy called RidgeAlloy that can turn contaminated car-body scrap into
      strong structural vehicle parts. Normally, impurities introduced during
      recycling make this scrap unsuitable for high-performance applications.
      RidgeAlloy overcomes that challenge, enabling recycled aluminum to meet
      the strength and durability standards required for modern vehicles. The
      technology could slash energy use, reduce imports, and unlock a huge new
      supply of domestic aluminum.
    imageUrl: https://www.sciencedaily.com/images/1920/ridgealloy-auto-part.webp
    categories: []
    publishedAt: 2026-03-11T00:46:16.000Z
    source: ScienceDaily — Engineering
  - title: Can AI read papers like a scientist? A new benchmark shows where LLMs fail
    url: https://techxplore.com/news/2026-03-ai-papers-scientist-benchmark-llms.html
    summary: To stay up to date and work forward in their fields, scientists must
      have at their fingertips and in their minds thousands of published
      studies. Large language models (LLMs) show promise as a tool for exploring
      the vast scientific literature, but are they trustworthy when it comes to
      providing full and scientifically accurate answers to complex questions in
      specialized fields?
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/can-ai-read-papers-lik.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-03-10T20:40:07.000Z
    source: TechXplore — Computer Science
  - title: Poultry processing robotics advances with ChicGrasp
    url: https://techxplore.com/news/2026-03-poultry-robotics-advances-chicgrasp.html
    summary: What started out as a response to labor shortages in poultry processing
      plants during the COVID-19 pandemic has turned into a robotics system that
      can learn by imitating human movements to handle chickens. Using an
      advanced imitation learning algorithm and camera perceptions, researchers
      with the Arkansas Agricultural Experiment Station have developed
      ChicGrasp, a dual-jaw robotic gripper with pinchers that can grasp a
      chicken carcass by the legs, lift and hang it on a shackle conveyor to be
      moved on for further processing.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/poultry-processing-rob-1.jpg
    categories:
      - Robotics
    publishedAt: 2026-03-10T20:10:06.000Z
    source: TechXplore — Robotics
  - title: Hair-thin 'soft yarn' actuator fiber moves with electricity
    url: https://techxplore.com/news/2026-03-hair-thin-soft-yarn-actuator.html
    summary: Researchers at Tohoku University, working with international
      collaborators in France, have developed an ultrafine "soft yarn" actuator
      fiber capable of bending, contracting, and producing complex
      three-dimensional movements when electricity is applied. The technology
      offers a new pathway for building safer soft robots and body-conforming
      wearable devices designed to interact closely with people.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/soft-fibers-that-move.jpg
    categories:
      - Engineering
    publishedAt: 2026-03-10T20:00:06.000Z
    source: TechXplore — Engineering
