  - title: Evolving AI may arrive before AGI and create hard-to-control risks
    url: https://techxplore.com/news/2026-04-evolving-ai-agi-hard.html
    summary: Evolutionary biology holds clues for the future of AI, argue
      researchers from the HUN-REN Centre for Ecological Research, Eötvös Loránd
      University, and the Royal Flemish Academy of Belgium for Science and the
      Arts. In a new Perspective published April 20 in Proceedings of the
      National Academy of Sciences, the team warn that evolvable AI (eAI)
      systems that can undergo Darwinian evolution may soon emerge, and they
      will generate special risks that can be understood, and mitigated, based
      on insights from evolutionary biology.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/evolving-ai-may-arrive.jpg
    categories:
      - Security
    publishedAt: 2026-04-29T21:20:09.000Z
    source: TechXplore — AI & Machine Learning
  - title: Ultralight carbon fiber lattices achieve aluminum-level performance at a
      fraction of the weight
    url: https://techxplore.com/news/2026-04-ultralight-carbon-fiber-lattices-aluminum.html
    summary: Researchers at Seoul National University have developed a new class of
      ultralight structural materials that combine the load-bearing strength of
      engineering materials with the weight of foam. Using a method called 3D
      node winding, the team created mesoscale carbon fiber lattices that
      achieve aluminum-level performance on a strength-to-weight basis while
      weighing as little as 1/100 the weight of aluminum. The findings,
      published in Nature Communications, demonstrate a new way to build strong,
      lightweight structures without the need for joints or layered assembly.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/ultralight-mesoscale-c.jpg
    categories:
      - Engineering
    publishedAt: 2026-04-29T20:40:01.000Z
    source: TechXplore — Engineering
  - title: What will it take to make AI-enabled robots safer?
    url: https://techxplore.com/news/2026-04-ai-enabled-robots-safer.html
    summary: 'The effort to "align" AI with human values is falling dangerously
      short in robotic systems, according to researchers from Penn Engineering,
      Carnegie Mellon University (CMU) and the University of Oxford. In a new
      paper appearing in Science Robotics, the researchers highlight the need to
      develop more thorough frameworks for ensuring that AI-enabled robots
      embody a core principle famously articulated by science fiction author
      Isaac Asimov: "A robot may not injure a human being."'
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2024/robot.jpg
    categories:
      - Robotics
    publishedAt: 2026-04-29T20:26:50.000Z
    source: TechXplore — Robotics
  - title: A new R package facilitates the generation of flowcharts for research
      studies
    url: https://techxplore.com/news/2026-04-package-generation-flowcharts.html
    summary: Representing the pathway of participants in a study is a key element in
      clinical and epidemiological research. Flow diagrams are the standard tool
      to do so, as they allow the different stages of the process to be clearly
      visualized, from initial selection to final analysis, following
      international guidelines such as CONSORT or STROBE. However, their
      creation is often laborious. It usually involves manually entering data or
      programming complex structures, which makes reproducibility more difficult
      and may increase the risk of errors.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/a-new-r-package-facili.jpg
    categories:
      - Software
    publishedAt: 2026-04-29T19:40:03.000Z
    source: TechXplore — Computer Science
  - title: Power Buffer Protects Grid From Data Centers’ Wild Load Swings
    url: https://spectrum.ieee.org/data-center-power-fluctuation
    summary: As more AI data centers come on line, concerns are rising about their
      effects on the grid, and it’s not just the amount of power they consume.
      They tend to have huge swings in power use, surging up and down by 70
      percent or more in milliseconds. Traditional electricity infrastructure
      isn’t designed to deal with that kind of load fluctuation.
    imageUrl: https://spectrum.ieee.org/media-library/staff-working-behind-computers-in-the-control-center.jpg?id=66648750&width=2000&height=1500&coordinates=166%2C0%2C167%2C0
    categories:
