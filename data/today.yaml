  - title: MIT engineers find a precise way to grow artificial blood vessels
    url: https://news.mit.edu/2026/mit-engineers-find-precise-way-to-grow-artificial-blood-vessels-0714
    summary: Tissue engineers are finding ways to grow living organs and tissues
      from cells, with the aim of replacing diseased and damaged counterparts in
      the body. Scientists have successfully grown artificial muscles, livers,
      kidneys, skin, and other tissues. But there’s been no reliable way to
      engineer precisely patterned networks of blood vessels, some of which can
      be finer than a human hair.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/MIT_Building-Blood%20Vessels-01-press.jpg?itok=9sQeg--H
    categories: []
    publishedAt: 2026-07-14T04:00:00.000Z
    source: MIT Engineering
  - title: "Designing high density data centers: Computational fluid dynamics
      analysis eliminates costly guesswork"
    url: https://techxplore.com/news/2026-07-high-density-centers-fluid-dynamics.html
    summary: As data centers and crypto-mining facilities expand to handle growing
      digital demands, keeping massive banks of servers cool has become a
      primary operational challenge. To address the energy inefficiencies
      plaguing these high-density computing spaces, engineering researchers at
      Lehigh University's Energy Research Center have developed a specialized
      modeling framework designed to reduce hot spots and improve thermal
      management.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2025/data-center-6.jpg
