articles:
  - title: By modeling visual saliency, AI improves ratings of artistic product
      designs
    url: https://techxplore.com/news/2026-07-visual-saliency-ai-artistic-product.html
    summary: Researchers have developed an artificial intelligence (AI) system that
      evaluates the visual appeal of literary and artistic product designs by
      mimicking how people naturally direct their attention across an image, a
      step that could help designers create products that better match consumer
      preferences. The work was published in the International Journal of
      Engineering Systems Modelling and Simulation.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/ai-design-for-life.jpg
    categories:
      - Consumer & Gadgets
    publishedAt: 2026-07-03T01:00:01.000Z
    source: TechXplore — AI & Machine Learning
  - title: New 4D-printing method creates lighter, faster-spinning wind turbine blades
    url: https://techxplore.com/news/2026-07-4d-method-lighter-faster-turbine.html
    summary: A new manufacturing technique developed by Concordia researchers could
      make small wind turbines lighter, less expensive and easier to produce.
      Using a process known as 4D printing of composites, Ph.D. candidate Emad
      Fakhimi and Suong Van Hoa, a professor at the Concordia Center for
      Composites, created curved blades for vertical-axis wind turbines from
      flat carbon-fiber composite panels. The study is published in the journal
      Polymer Composites.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/new-4d-printing-method-1.jpg
    categories:
      - Engineering
    publishedAt: 2026-07-02T21:40:07.000Z
    source: TechXplore — Engineering
  - title: Giving drones a sense of 'pain' could help them predict instability
      before it happens
    url: https://techxplore.com/news/2026-07-drones-pain-instability.html
    summary: "Imagine you're running and you sprain your ankle. The pain makes you
      gingerly limp the rest of the way home. This is a great example of how
      nature adapts to failures in a system. The pain tells you: \"If you
      continue running like normal, the injury will only get worse.\" So you
      naturally adjust the way you run. Drones currently cannot do this with a
      worn-out propeller."
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/giving-drones-a-sense.jpg
    categories:
      - Robotics
    publishedAt: 2026-07-02T19:00:06.000Z
    source: TechXplore — Robotics
