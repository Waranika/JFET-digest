  - title: Hello Robot Sets the Standard for Practical, Safe Home Robots
    url: https://spectrum.ieee.org/stretch-4-home-robot
    summary: Many roboticists (and at least one robotics journalist) have been
      seduced by the dream of a robot butler. And the rampant popularity of
      videos showing humanoid robots doing household tasks in improbably clean
      kitchens and unrealistically tidy bedrooms suggests that we’re not the
      only ones interested in a robot that can do our chores. But for all kinds
      of reasons, legged humanoids are not yet ready for industrial or
      commercial applications at scale, and home applications (if people even
      want them), I would argue, are even farther away. Even so, ludicrously
      well-funded humanoid robotics companies are now ramping production while
      explicitly promising that their robots will be doing ‘housework.’
    imageUrl: https://spectrum.ieee.org/media-library/tall-wheeled-home-robot-with-an-extended-arm-in-a-modern-living-room-near-a-potted-cactus.jpg?id=66719760&width=1245&height=700&coordinates=0%2C187%2C0%2C187
