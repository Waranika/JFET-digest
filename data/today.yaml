  - title: Resilient actuator shows potential for space-ready soft robots
    url: https://techxplore.com/news/2026-04-resilient-actuator-potential-space-ready.html
    summary: To be safely and reliably deployed in outer space, underwater and in
      other extreme environments, robots need to be able to withstand harsh
      conditions without breaking. In addition, they should be able to promptly
      and rapidly adapt to dynamic changes in their surroundings.
