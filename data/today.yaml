    publishedAt: 2026-05-25T14:00:01.000Z
    source: IEEE Spectrum — Computing & Chips
  - title: AI won’t replace you but someone using AI might
    url: https://www.sciencedaily.com/releases/2026/05/260525000448.htm
    summary: Generative AI is transforming the workplace faster than ever, but new
      research from the University of Vaasa suggests the biggest threat may not
      be AI itself — it’s falling behind in learning how to use it. Researcher
      Zhe Zhu found that employees who see tools like ChatGPT and Gemini as
      helpful collaborators rather than job-stealing rivals tend to be more
      engaged, adaptable, and optimistic about their careers.
    imageUrl: https://www.sciencedaily.com/images/1920/ai-cyborg-robot-whispering-secret-to-man.webp
    categories: []
    publishedAt: 2026-05-25T11:21:14.000Z
    source: ScienceDaily — Robotics
