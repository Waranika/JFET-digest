  - title: The race to regulate AI systems has lawyers getting creative
    url: https://techxplore.com/news/2026-05-ai-lawyers-creative.html
    summary: Can an artificial intelligence tool, such as a chatbot, be held
      responsible if people committed crimes based on information they got from
      the tool? Should chatbots, which are programmed to closely mimic human
      thought patterns and are increasingly treated as companions, be subject to
      legal checks that acknowledge those tools' developing independence or
      autonomy?
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/the-race-to-regulate-a.jpg
    categories:
      - Machine learning & AI
    publishedAt: 2026-05-27T22:00:02.000Z
    source: TechXplore — AI & Machine Learning
  - title: Pea-size liquid-metal pump runs robot butterfly on under 0.1 V
    url: https://techxplore.com/news/2026-05-pea-size-liquid-metal-robot.html
    summary: Engineers have invented an ingenious liquid-metal pump that could make
      future soft robotics and wearable devices much more portable and agile.
      The innovation, led by the University of Bristol and published in the
      journal Nature Communications, presents a low-voltage power source with
      the potential to transform robotic systems for a wide range of
      applications, from robotic legs to haptic gloves used in medical and
      industrial settings.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/pea-size-liquid-metal.jpg
    categories:
      - Robotics
    publishedAt: 2026-05-27T19:40:04.000Z
    source: TechXplore — Robotics
  - title: Childlike AI uncovers why language grows more structured across generations
    url: https://techxplore.com/news/2026-05-childlike-ai-uncovers-language-generations.html
    summary: New research from the University of the Witwatersrand, South Africa,
