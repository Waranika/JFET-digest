    publishedAt: 2026-07-19T17:40:02.000Z
    source: TechXplore — AI & Machine Learning
  - title: New AI blood test predicts heart disease 15 years early
    url: https://www.sciencedaily.com/releases/2026/07/260716023603.htm
    summary: A new AI-powered blood test could give people a remarkably early
      warning of serious heart and circulation problems. Developed by
      researchers at the University of Hong Kong, CardiOmicScore analyzes
      thousands of proteins and metabolites to estimate the risk of six major
      cardiovascular diseases, including heart attack, stroke, heart failure,
      and atrial fibrillation. Unlike genetic risk scores, which remain fixed
      throughout life, the system captures biological changes linked to a
      person’s current health, lifestyle, and environment.
    imageUrl: https://www.sciencedaily.com/images/1920/ai-cardiology.webp
    categories: []
    publishedAt: 2026-07-19T14:58:00.000Z
    source: ScienceDaily — Robotics
  - title: New AR display tech boosts real‑world visibility while keeping virtual
      objects lifelike
    url: https://techxplore.com/news/2026-07-ar-display-tech-boosts-realworld.html
    summary: Optical see-through augmented reality (AR) glasses are designed to
      overlay digital information onto the real world, but improving the realism
      of virtual objects often comes at a cost. Existing occlusion technologies
      physically block part of the incoming light, reducing the brightness of
      the real environment and making everyday tasks more challenging.
      Overcoming this balance between virtual realism and real-world visibility
      is a key hurdle for next-generation AR systems.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/new-perception-based-t.jpg
    categories:
      - Engineering
    publishedAt: 2026-07-19T12:00:04.000Z
    source: TechXplore — Engineering
