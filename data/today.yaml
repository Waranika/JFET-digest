  - title: AI models can fake visual understanding of images that don't exist
    url: https://techxplore.com/news/2026-04-ai-fake-visual-images-dont.html
    summary: It wasn't long ago that news headlines claimed that AI might soon
      assist radiologists in interpreting X-rays of broken bones and analyzing
      mammograms. We are still far from the destination, as a new study has
      brought to light the mirage effect, where AI creates detailed descriptions
      of images that do not exist.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/fake-radiology-underst.jpg
