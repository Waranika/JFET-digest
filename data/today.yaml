  - title: A Bit of Data Center Heat Can Be Turned Back into Electricity
    url: https://spectrum.ieee.org/data-center-thermoelectric-generation
    summary: Managing heat in AI data centers is a growing challenge. As
      hyperscalers cram more and more high power computing systems into huge
      facilities, they generate more and more heat. Data center designs are
      switching from fan-based systems to liquid ones, which pipe water near
      electronics to gather up waste heat. That hot water is then cooled,
      dissipating the heat into the environment.
    imageUrl: https://spectrum.ieee.org/media-library/a-block-of-metal-with-t-shaped-crystals-inside-on-the-left-and-with-holes-where-the-crystals-were-on-the-right.jpg?id=66668556&width=1245&height=700&coordinates=0%2C62%2C0%2C63
