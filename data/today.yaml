  - title: Ten from MIT accept 2026 Fulbright awards
    url: https://news.mit.edu/2026/fulbright-awards-0526
    summary: Ten MIT affiliates — including undergraduates, graduate students, and
      alumni — have accepted Fulbright grants to conduct research in countries
      across the world. Five other students declined their awards to pursue
      other opportunities, and another student is still deciding. In total, 16
      of MIT’s 30 Fulbright applicants won awards this year.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202605/MIT-Fulbright-2026.jpg?itok=StbbVY97
    categories: []
