  - title: Ordinary WiFi can now identify people with near perfect accuracy
    url: https://www.sciencedaily.com/releases/2026/05/260522023127.htm
    summary: "Scientists in Germany have demonstrated a startling new form of
      surveillance: identifying people using nothing more than ordinary WiFi
      signals. By analyzing how radio waves bounce around a room, researchers
      can effectively “see” and recognize individuals — even if they are not
      carrying a device and even if their phone is turned off."
    imageUrl: https://www.sciencedaily.com/images/1920/wifi-imaging-secret-spying.webp
    categories: []
    publishedAt: 2026-05-23T03:03:54.000Z
    source: ScienceDaily — Engineering
