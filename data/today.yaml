  - title: Largest Probabilistic Computer Hits 1 Million P-Bits
    url: https://spectrum.ieee.org/biggest-probabilistic-computer
    summary: Probabilistic computers might one day tackle certain problems well
      beyond standard computers while at the same time avoiding the many
      hardware challenges that currently vex quantum computing. Now scientists
      reveal they have created the largest probabilistic computer yet, one with
      1 million “probabilistic bits,” a new study they suggest reveals the way
      forward to building even bigger machines.
    imageUrl: https://spectrum.ieee.org/media-library/computer-chips-spread-vertically-across-several-shelves-to-create-a-1-million-probabilistic-bit-computer.jpg?id=67500450&width=1245&height=700&coordinates=0%2C187%2C0%2C188
