  - title: AI Processing of Earth Images Can Now Run in Space
    url: https://spectrum.ieee.org/ai-earth-observation-in-space
    summary: AI image processing aboard satellites in space has been a goal of the
      Earth observation industry for years. Now it has finally been achieved.
      Planet Labs, based in Calif., released an image captured by its Pelican-4
      multispectral satellite showing an airport in Alice Springs, Australia. On
      the tarmac, more than a dozen aircraft are scattered, each highlighted in
      a neat green box, identified by an AI model running aboard the satellite.
    imageUrl: https://spectrum.ieee.org/media-library/satellite-image-of-an-airport-with-all-visible-planes-highlighted-by-ai-recognition-boxes.jpg?id=66663058&width=1200&height=800&coordinates=0%2C208%2C0%2C208
