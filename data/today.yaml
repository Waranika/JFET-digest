  - title: After 20 years, scientists finally shrink a powerful laser onto a chip
    url: https://www.sciencedaily.com/releases/2026/06/260604044240.htm
    summary: Researchers at EPFL have developed a chip-scale ultrafast laser that
      performs on par with traditional tabletop femtosecond lasers. The
      innovation could make advanced laser technologies far smaller, cheaper,
      and more accessible for applications ranging from medical diagnostics to
      atomic clocks.
