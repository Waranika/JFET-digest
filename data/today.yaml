articles:
  - title: Physicists create sensor that detects and locates radiation with precision
    url: https://techxplore.com/news/2026-07-physicists-sensor-precision.html
    summary: Scientists from the Faculty of Physics at Vilnius University (VU) have
      developed a sensor capable of accurately detecting radiation, identifying
      its sources, and determining its intensity and precise location. The
      device, developed by physicists at the Institute of Photonics and
      Nanotechnology, Photoelectric Phenomena Research Group, can detect doses
      ranging from very small to very large, including those typical of
      industrial environments or nuclear emergencies, from a few gray to
      megagray.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/physicists-create-sens-1.jpg
    categories:
      - Engineering
    publishedAt: 2026-07-02T00:00:02.000Z
    source: TechXplore — Engineering
  - title: Mexico’s Victory Over Ecuador Made the Ground Shake. Was It an Artificial
      Earthquake?
    url: https://www.wired.com/story/mexicos-victory-over-ecuador-artificial-earthquake/
    summary: Fans’ euphoric reactions to the Mexican national team’s recent victory
