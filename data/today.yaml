  - title: Tackling the housing shortage with robotic microfactories
    url: https://news.mit.edu/2026/tackling-housing-shortage-robotic-microfactories-0421
    summary: A national housing shortage is straining finances and communities
      across the United States. In Massachusetts, at least 222,000 homes will
      have to be built in the next 10 years to meet the population's needs. At
      the same time, there are numerous challenges in traditional construction.
      There's a shortage of skilled construction workers. Most projects involve
      multiple contractors and subcontractors, adding complexity and lag time.
      And the construction process, as well as the buildings themselves, can be
      a major source of emissions that contribute to climate change.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202604/mit-system-design.jpg?itok=H2Sm6ipG
    categories: []
    publishedAt: 2026-04-21T21:45:00.000Z
    source: MIT Robotics
