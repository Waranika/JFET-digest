  - title: Adaptive battery reduces energy costs and peak power demand in greenhouses
    url: https://techxplore.com/news/2026-05-battery-energy-peak-power-demand.html
    summary: Researchers at Karlstad University have developed a new intelligent
      control strategy for battery storage in climate-controlled greenhouses. By
      combining artificial intelligence and signal-processing algorithms with
      short-term forecasts of electricity consumption and solar power
      generation, energy costs can be reduced while simultaneously easing the
      load on the power grid. The findings are published in the journal IEEJ
      Transactions on Electrical and Electronic Engineering.
