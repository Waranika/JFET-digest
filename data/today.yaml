  - title: Could AI tell you where you left your keys?
    url: https://news.mit.edu/2026/could-ai-tell-you-where-you-left-your-keys-0617
    summary: An auto factory worker can remember the storage bin where she left a
      partly assembled component the night before, and quickly return to that
      spot to pick it up. But robots that may work side-by-side with her would
      struggle to develop and access this same type of “spatiotemporal” memory.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202606/MIT-DescribeAnything-01-press.jpg?itok=RxMov68e
    categories: []
    publishedAt: 2026-06-17T04:00:00.000Z
    source: MIT Robotics
  - title: Tensordyne Claims Massive Speed and Power Improvement Over Nvidia
    url: https://spectrum.ieee.org/tensordyne-inference-claim
    summary: If simulations are to be believed, startup Tensordyne’s new AI chip
      could crush the performance of market leader Nvidia in terms of energy
      efficiency and latency for inferencing. The company just sent the plans
      for its first chip to be manufactured, with commercial sales of a 72-chip
      system scheduled for the second half of 2027. Tensordyne claims its
      72-chip system can run large LLMs four times as fast using one-fifth the
      power compared to a 72-Nvidia GB300 system. However, real systems won’t be
      around to back these figures up until the end of the year.
    imageUrl: https://spectrum.ieee.org/media-library/two-views-of-a-black-rack-mounted-server-chassis-with-stacked-hardware-modules.jpg?id=66906634&width=1245&height=700&coordinates=0%2C62%2C0%2C63
    categories:
      - Inferencing
      - Ai-hardware
      - Nvidia
      - Mathematics
    publishedAt: 2026-06-15T17:31:09.000Z
    source: IEEE Spectrum — Computing & Chips
  - title: This strange material can become strong or fall apart in seconds
    url: https://www.sciencedaily.com/releases/2026/06/260615033849.htm
    summary: Scientists have found that staple-shaped particles can tangle together
      to create a material that is both strong and flexible. Unlike conventional
      materials, these particles can be locked into a sturdy structure or
      rapidly unraveled using vibrations. The unusual behavior could open the
      door to recyclable buildings, reconfigurable structures, and even
      futuristic robotic technologies.
    imageUrl: https://www.sciencedaily.com/images/1920/metal-staples-arch.webp
    categories: []
    publishedAt: 2026-06-15T11:54:43.000Z
    source: ScienceDaily — Engineering
  - title: Why asking people to rank three options could sharpen AI and
      recommendation systems
    url: https://techxplore.com/news/2026-06-people-options-sharpen-ai.html
    summary: In his 1927 paper, "A law of comparative judgment," the American
      psychologist L. L. Thurstone proposed that when people select one option
      among multiple alternatives, they are picking the one that has the highest
      value to them, even though they cannot assign a particular number to that
      choice.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/when-it-comes-to-predi.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-06-14T14:40:01.000Z
    source: TechXplore — Computer Science
  - title: Brain-inspired chip runs near absolute zero and could transform quantum
      computing
    url: https://www.sciencedaily.com/releases/2026/06/260612032024.htm
    summary: Scientists at the University of Hong Kong have created a remarkable new
      type of brain-inspired chip that can function just above absolute zero,
      one of the coldest environments imaginable. By using a standard silicon
      carbide transistor in a completely new way, the team made a single device
      behave like an energy-efficient neuron, firing electrical “spikes” similar
      to those in the human brain.
    imageUrl: https://www.sciencedaily.com/images/1920/digital-brain-circuit-computer-chip.webp
    categories: []
    publishedAt: 2026-06-12T10:38:54.000Z
    source: ScienceDaily — Computer Science
  - title: Scientists discover a strange property in rice and turn it into a smart
      material
    url: https://www.sciencedaily.com/releases/2026/06/260611024621.htm
    summary: "Scientists discovered that rice behaves in a highly unusual way: it
      weakens under rapid compression but stays stronger when pressure is
      applied slowly. Using this effect, they engineered a new material that
      reacts differently to gentle movements and sudden impacts. The material
      can adapt its stiffness automatically, opening the door to safer soft
      robots and protective equipment that responds instantly to collisions."
    imageUrl: https://www.sciencedaily.com/images/1920/rice-petri-dish-gmo-science.webp
    categories: []
    publishedAt: 2026-06-11T12:29:52.000Z
    source: ScienceDaily — Robotics
  - title: This DIY Bipedal Robot Used Pneumatic “Air-Muscles” Instead of Motors
    url: https://spectrum.ieee.org/shadow-walker-biped-humanoid-robot
    summary: In 1987, Richard Greenhill, a British photographer who was fascinated
      by (but had no actual training in) robotics, decided he wanted to build a
      life-size humanoid that could do useful things, like carrying luggage. He
      was working at a startup called Intergalactic Robots, but he couldn’t
      convince anyone there to build such a machine, so he set about building
      one himself, in his attic.
    imageUrl: https://spectrum.ieee.org/media-library/two-photos-of-a-prototype-humanoid-robot-with-a-wooden-frame-and-wires-and-other-components-strung-on-its-body.jpg?id=66825613&width=1245&height=700&coordinates=0%2C187%2C0%2C188
    categories:
