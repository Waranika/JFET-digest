  - title: NASA just tested a powerful new thruster that could send humans to Mars
    url: https://www.sciencedaily.com/releases/2026/05/260505234611.htm
    summary: A powerful new electromagnetic thruster has taken a major step forward
      after a successful high-energy test at NASA’s Jet Propulsion Laboratory.
      Fueled by lithium vapor and driven by intense magnetic forces, the
      experimental engine reached record-breaking power levels—far beyond
      anything currently used in space. Glowing hotter than molten lava and
      firing inside a specialized vacuum chamber, the thruster hints at a future
      where spacecraft could travel farther and more efficiently than ever
      before.
    imageUrl: https://www.sciencedaily.com/images/1920/jpl-tests-next-generation-electric-thruster.webp
    categories: []
    publishedAt: 2026-05-06T21:00:24.000Z
    source: ScienceDaily — Engineering
