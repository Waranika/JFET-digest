  - title: Truckloads of food are being wasted because computers won’t approve them
    url: https://www.sciencedaily.com/releases/2026/04/260403224505.htm
    summary: Modern food systems may look stable on the surface, but they are
      increasingly dependent on digital systems that can quietly become a major
      point of failure. Today, food must be “recognized” by databases and
      automated platforms to be transported, sold, or even released, meaning
      that if systems go down, food can effectively become unusable—even when
      it’s physically available.
    imageUrl: https://www.sciencedaily.com/images/1920/food-waste-tomatoes-in-trash-dumpster.webp
    categories: []
    publishedAt: 2026-04-05T04:23:02.000Z
    source: ScienceDaily — Robotics
  - title: Helping resolve quantum computers' memory problem
    url: https://techxplore.com/news/2026-04-quantum-memory-problem.html
    summary: A major problem with quantum computers is memory, as the information
      they contain can be quickly lost. Quantum computers are not yet fully
      reliable—they are far too unstable. However, all around the world, people
      are trying to improve them—some of whom are based in Norway.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/helping-resolve-quantu-1.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-04-04T14:00:01.000Z
