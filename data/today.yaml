  - title: Autonomous navigation of microrobots in complex flows demonstrated for
      the first time
    url: https://techxplore.com/news/2026-03-autonomous-microrobots-complex.html
    summary: For the first time, researchers at Leipzig University have shown that
      tiny synthetic microswimmers can perceive their surroundings directly
      through their own body shape and autonomously adapt to rapidly changing
      fluid flows. The study, now published in Science Advances, establishes a
      new paradigm for autonomous microsystems whose control functions reliably
      in challenging environments where conventional sensors fail. This opens up
      new prospects for autonomous medical microrobots, for example for the
      targeted delivery of medication in the bloodstream.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/autonomous-navigation.jpg
    categories:
      - Robotics
    publishedAt: 2026-03-17T19:00:09.000Z
    source: TechXplore — Engineering
  - title: New model uses team interactions to predict next steps in collaborative
      work
    url: https://techxplore.com/news/2026-03-team-interactions-collaborative.html
    summary: Finding the right information at the right time is critical for solving
      complex problems. Researchers have developed an algorithm that helps
      individuals locate needed information more efficiently by drawing on both
      a user's own history and behavioral cues, as well as the history and
      behavioral cues of teammates collaborating to solve the problem.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/collaborative-work.jpg
