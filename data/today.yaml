  - title: Physicists recreate black hole energy extraction in the lab
    url: https://www.sciencedaily.com/releases/2026/07/260711010120.htm
    summary: Researchers have recreated the physics of extracting energy from a
      spinning black hole using a stationary device that produces synthetic
      ultrafast rotation. The achievement transforms a long-standing theoretical
      idea into a practical experiment and could inspire new advances in optics,
      wireless communications, and quantum science.
    imageUrl: https://www.sciencedaily.com/images/1920/penrose-super-radiance-artwork.webp
    categories: []
    publishedAt: 2026-07-12T12:28:41.000Z
    source: ScienceDaily — Engineering
  - title: Harvard scientists turn a silicon chip into a DNA writing machine
    url: https://www.sciencedaily.com/releases/2026/07/260708022202.htm
    summary: Scientists have created a silicon chip that can write dozens of DNA
      sequences simultaneously using electricity and water-based enzymes,
      offering a cleaner alternative to conventional DNA manufacturing. The
      breakthrough could eventually support portable DNA-writing devices and
      even massive DNA data storage, although new chemistry will be needed to
      scale the technology further.
    imageUrl: https://www.sciencedaily.com/images/1920/chip-dna-writer.webp
    categories: []
    publishedAt: 2026-07-09T02:48:06.000Z
    source: ScienceDaily — Computer Science
