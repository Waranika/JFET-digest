  - title: Can AI help predict which heart-failure patients will worsen within a year?
    url: https://news.mit.edu/2026/can-ai-help-predict-which-heart-failure-patients-will-worsen-0312
    summary: Characterized by weakened or damaged heart musculature, heart failure
      results in the gradual buildup of fluid in a patient’s lungs, legs, feet,
      and other parts of the body. The condition is chronic and incurable, often
      leading to arrhythmias or sudden cardiac arrest. For many centuries,
      bloodletting and leeches were the treatment of choice, famously practiced
      by barber surgeons in Europe, during a time when physicians rarely
      operated on patients.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202602/mit-jameel-yau-bergamaschi-PULSE.jpg?itok=t0tTj-za
    categories: []
    publishedAt: 2026-03-12T21:30:00.000Z
    source: MIT Artificial Intelligence
  - title: A better method for planning complex visual tasks
    url: https://news.mit.edu/2026/better-method-planning-complex-visual-tasks-0311
    summary: MIT researchers have developed a generative artificial
