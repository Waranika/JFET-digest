  - title: A simple way to tune wave energy devices for higher efficiency
    url: https://techxplore.com/news/2026-06-simple-tune-energy-devices-higher.html
    summary: "Wave energy has long been seen as a promising source of clean
      electricity. The ocean is always moving, and that motion carries a huge
      amount of energy. But many wave energy devices have one important
      limitation: They do not naturally move in sync with ocean waves. When that
      happens, they capture less power."
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/a-simple-way-to-tune-w.jpg
    categories:
      - Engineering
    publishedAt: 2026-06-29T21:00:05.000Z
    source: TechXplore — Engineering
  - title: "Designed to tempt: How mini AI lines up carrots to look their best"
    url: https://techxplore.com/news/2026-06-mini-ai-lines-carrots.html
    summary: "The researchers teach the packaging machine what is up and down on a
      snack carrot. The program runs on a small, local PC—not on huge servers in
      some faraway cloud. The goal: to pack quickly, cheaply and attractively—so
      that consumers like us are tempted by locally sourced, healthy snacks."
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/designed-to-tempt-how-1.jpg
    categories:
      - Robotics
    publishedAt: 2026-06-29T20:40:10.000Z
    source: TechXplore — Robotics
  - title: "Inaugural Music Technology Research Showcase celebrates work of new
      graduate program’s initial students "
    url: https://news.mit.edu/2026/inaugural-mit-music-technology-research-showcase-celebrates-work-students-0629
    summary: The MIT Music Technology and Computation (MTC) Graduate Program —
      launched in fall 2024 as a collaboration between the Music and Theater
      Arts Section in the School of Humanities, Arts, and Social Sciences
      (SHASS), and the School of Engineering (SoE) — presented its inaugural MIT
      Music Technology Research Showcase on May 13. The event played to a
      standing room-only house in the Edward and Joyce Linde Music Building’s
      Thomas Tull Concert Hall and featured diverse and captivating research
      presentations and music performances.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202606/mit-music-tech-showcase.jpg?itok=viJf9zsW
    categories: []
    publishedAt: 2026-06-29T19:00:00.000Z
    source: MIT Artificial Intelligence
  - title: Dark web survey reveals Tor is smaller, shakier and more duplicated than
      expected
    url: https://techxplore.com/news/2026-06-dark-web-survey-reveals-tor.html
    summary: A study led by researchers from IMDEA Networks and Carlos III
      University of Madrid (UC3M) has carried out the first large-scale analysis
      of the volatility, content and actual infrastructure of hidden websites on
      the so-called dark web. This work was among the recipients of the
      2025–2026 Spanish Police Foundation Research Awards, which recognize
      scientific research that contributes to ensuring public safety and
      protecting citizens' rights and freedoms.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/dark-web.jpg
    categories:
      - Internet
    publishedAt: 2026-06-29T14:20:06.000Z
    source: TechXplore — Computer Science
