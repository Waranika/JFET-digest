  - title: AI-designed universal coronavirus vaccine passes first human trial
    url: https://www.sciencedaily.com/releases/2026/06/260605023357.htm
    summary: Scientists have successfully tested an AI-designed universal
      coronavirus vaccine in humans for the first time, finding it to be safe
      and well tolerated. The vaccine generated immune responses against
      multiple coronaviruses, including SARS-CoV-2, SARS, and related bat
      viruses with pandemic potential. By targeting features shared across an
      entire virus family, it aims to provide protection even as viruses evolve.
    imageUrl: https://www.sciencedaily.com/images/1920/clinical-trial-volunteer-receiving-new-universal-vaccine.webp
    categories: []
    publishedAt: 2026-06-05T15:42:19.000Z
