  - title: AI chatbots can be as effective as humans at emotional support—sometimes
      better
    url: https://techxplore.com/news/2026-07-ai-chatbots-effective-humans-emotional.html
    summary: New research led by The University of Manchester in collaboration with
      Durham University has found that AI chatbots such as ChatGPT can match—and
      in some situations outperform—humans as a source of everyday emotional
      support. However, the advantage depends on the emotional context, and a
      key ingredient for effective support—offering specific, actionable
      guidance—can boost the quality of support from both humans and AI alike.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/ai-chatbot.jpg
    categories:
      - Consumer & Gadgets
    publishedAt: 2026-07-22T23:00:01.000Z
    source: TechXplore — AI & Machine Learning
  - title: Why Lettuce Is Always Making People Sick
    url: https://www.wired.com/story/why-lettuce-always-making-people-sick/
    summary: The cyclospora diarrhea outbreak isn’t an isolated incident. It’s part
      of a pattern of leafy greens wreaking digestive havoc.
