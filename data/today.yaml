  - title: AI Trained on Birdsong Can Recognize Whale Calls
    url: https://spectrum.ieee.org/foundation-models-google-birds-whales
    summary: Birds’ chirps, trills, and warbles echo through the air, while whales’
      boings, “biotwangs,” and whistles vibrate underwater. Despite the
      variations in sounds and the medium through which they travel, both
      birdsong and whale vocalizations can be classified by Perch 2.0, an AI
      audio model from Google DeepMind.
    imageUrl: https://spectrum.ieee.org/media-library/conceptual-illustration-of-a-songbird-s-silhouette-with-sound-lines-coming-from-its-mouth-these-lines-extend-into-abstract-oce.jpg?id=65257073&width=1200&height=800&coordinates=0%2C83%2C0%2C84
