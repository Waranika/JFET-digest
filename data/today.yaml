  - title: Vibecoded Malware Is Flooding the Internet
    url: https://spectrum.ieee.org/vibecoding-malware
    summary: Vibe coding’s dark side, “vibe hacking,” is on the rise. Cybersecurity
      companies such as McAfee and Bitdefender have observed recent spikes in
      vibe-coded malware, also called “vibeware,” with telltale signs such as
      explanatory code comments or template placeholders akin to what vibe-coded
      apps contain. But just how challenging is it to stop the spread of bad
      vibes from these emerging cyberattacks?
    imageUrl: https://spectrum.ieee.org/media-library/graphic-of-a-forward-slash-between-two-brackets-meant-to-represent-computer-programming.jpg?id=66953058&width=1245&height=700&coordinates=0%2C187%2C0%2C188
    categories:
