  - title: Human-machine learning boosts noninvasive brain-computer control in
      untrained users
    url: https://techxplore.com/news/2026-07-human-machine-boosts-noninvasive-brain.html
    summary: Implantable devices in the brain have been used for about 30 years to
      assist people with disabilities in completing motor tasks. However, the
      devices are simply not accessible to the vast majority of people who need
      help. Despite decades of work in this field, fewer than 100 people
      worldwide have benefited from the technology. The costs are prohibitive,
      and the brain surgeries are inherently risky.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/joint-human-machine-le.jpg
