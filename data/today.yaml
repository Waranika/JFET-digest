  - title: Robot 'Floaty' rides the wind like a bird, staying stable without
      propellers
    url: https://techxplore.com/news/2026-06-robot-floaty-bird-staying-stable.html
    summary: "Current flying objects face a trade-off: Drones with propellers, for
      instance, are very agile and able to hover; however, they use up a lot of
      energy. Airplanes, on the other hand, feature fixed wings that allow them
      to fly very efficiently. The downside: They can't remain suspended in the
      air like a kestrel on the lookout for prey."
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/flying-robot-rides-the-1.jpg
    categories:
      - Robotics
    publishedAt: 2026-06-22T17:40:14.000Z
    source: TechXplore — Robotics
  - title: Revocable fingerprint IDs may reduce permanent biometric theft risks,
      paper suggests
    url: https://techxplore.com/news/2026-06-revocable-fingerprint-ids-permanent-biometric.html
    summary: The obvious problem with biometrics is that once someone has stolen
      your fingerprint or iris ID, you cannot simply reset those to block their
      access as you might a password. Now, research published in the
      International Journal of Computational Vision and Robotics offers a new
      approach to protecting biometric authentication data so that the risk
      associated with this kind of irreversible identity theft can be largely
      avoided and gives users an option to reset their fingerprints and other
      biometrics, as it were.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2024/fingerprint.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-06-22T17:40:07.000Z
    source: TechXplore — Computer Science
  - title: This Device Takes Photographs With a Single Atom
    url: https://spectrum.ieee.org/single-atom-camera-quantum-computing
    summary: Today, it’s quite possible to see individual atoms in photographs. It’s
      one of the great triumphs of imaging. What, then, of the inverse? Can you
      use a single atom to capture an image?
    imageUrl: https://spectrum.ieee.org/media-library/pixelated-light-patterns-captured-with-an-atom-camera-including-a-lattice-comet-like-shape-and-two-circles-side-by-side.jpg?id=66947683&width=1245&height=700&coordinates=0%2C62%2C0%2C63
    categories:
