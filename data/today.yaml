  - title: Simple coating could make next-generation chip transistors easier to
      manufacture without damaging ultrathin layers
    url: https://techxplore.com/news/2026-06-simple-coating-generation-chip-transistors.html
    summary: "Inside computer chips are billions of tiny transistors made from
      silicon. But the material is approaching its limits. In an effort to build
      smaller, more capable devices, researchers are exploring how they might
      build transistors with other materials alongside silicon, including a
      class of extremely thin materials called transition metal dichalcogenides
      (TMD). One of the leading TMD candidates is a material called molybdenum
      disulfide. It is only three atoms thick: one layer of molybdenum
      sandwiched between two layers of sulfur."
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/new-method-boosts-futu.jpg
    categories:
      - Engineering
    publishedAt: 2026-06-16T17:20:06.000Z
    source: TechXplore — Engineering
  - title: Elephant trunk skin reveals design that could reshape soft robotics
    url: https://techxplore.com/news/2026-06-elephant-trunk-skin-reveals-reshape.html
    summary: An elephant's trunk is both strong and capable of extremely fine motor
      movements. With this muscular, boneless structure, an elephant can carry
      heavy logs—or deftly peel a banana. Lucia Beccai and colleagues studied
      the skin of the trunk, hoping to understand its properties and derive
      lessons for the next generation of advanced soft robotics. The authors
      obtained a trunk from a single adult Asian elephant (Elephas maximus) that
      died of natural causes at Zurich Zoo, Switzerland, in 2020.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/elephant-trunks-and-ro.jpg
    categories:
      - Robotics
    publishedAt: 2026-06-16T16:00:03.000Z
    source: TechXplore — Robotics
  - title: Tensordyne Claims Massive Speed and Power Improvement Over Nvidia
    url: https://spectrum.ieee.org/tensordyne-inference-claim
    summary: If simulations are to be believed, startup Tensordyne’s new AI chip
      could crush the performance of market leader Nvidia in terms of energy
      efficiency and latency for inferencing. The company just sent the plans
      for its first chip to be manufactured, with commercial sales of a 72-chip
      system scheduled for the second half of 2027. Tensordyne claims its
      72-chip system can run large LLMs four times as fast using one-fifth the
      power compared to a 72-Nvidia GB300 system. However, real systems won’t be
      around to back these figures up until the end of the year.
    imageUrl: https://spectrum.ieee.org/media-library/two-views-of-a-black-rack-mounted-server-chassis-with-stacked-hardware-modules.jpg?id=66906634&width=1245&height=700&coordinates=0%2C62%2C0%2C63
    categories:
      - Inferencing
      - Ai-hardware
      - Nvidia
      - Mathematics
    publishedAt: 2026-06-15T17:31:09.000Z
    source: IEEE Spectrum — Computing & Chips
  - title: This strange material can become strong or fall apart in seconds
    url: https://www.sciencedaily.com/releases/2026/06/260615033849.htm
    summary: Scientists have found that staple-shaped particles can tangle together
      to create a material that is both strong and flexible. Unlike conventional
      materials, these particles can be locked into a sturdy structure or
      rapidly unraveled using vibrations. The unusual behavior could open the
      door to recyclable buildings, reconfigurable structures, and even
      futuristic robotic technologies.
    imageUrl: https://www.sciencedaily.com/images/1920/metal-staples-arch.webp
    categories: []
    publishedAt: 2026-06-15T11:54:43.000Z
    source: ScienceDaily — Engineering
  - title: Why asking people to rank three options could sharpen AI and
      recommendation systems
    url: https://techxplore.com/news/2026-06-people-options-sharpen-ai.html
    summary: In his 1927 paper, "A law of comparative judgment," the American
      psychologist L. L. Thurstone proposed that when people select one option
      among multiple alternatives, they are picking the one that has the highest
      value to them, even though they cannot assign a particular number to that
      choice.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/when-it-comes-to-predi.jpg
    categories:
      - Computer Sciences
    publishedAt: 2026-06-14T14:40:01.000Z
    source: TechXplore — Computer Science
