  - title: A better way to turn 2D designs into 3D models for rapid prototyping
    url: https://news.mit.edu/2026/turning-2d-designs-into-3d-models-for-rapid-prototyping-0716
    summary: Engineers often use vision-language models to produce new designs, such
      as for airplane or automobile components. To simulate how those components
      will perform in realistic situations, they’ll use tried-and-true
      computer-aided design (CAD) software to generate 3D models of those
      designs, which they can put through virtual crash or durability tests.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202607/MIT-Geometric-Tuning-01-press.jpg?itok=y_aKzkkP
