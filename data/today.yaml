  - title: Illinois Lawmakers Just Passed America’s Strongest AI Safety Bill
    url: https://www.wired.com/story/illinois-pass-major-ai-safety-law-pritzker/
    summary: The bill requires companies like OpenAI, Anthropic, and Google to have
      third parties confirm they’re following safety standards. Illinois
      governor JB Pritzker says he’ll sign it.
    imageUrl: https://media.wired.com/photos/6a1769e135f75a644600c4ac/191:100/w_1280,c_limit/Illionois-AI-Safetry-Bill-Business-2270597563.jpg
