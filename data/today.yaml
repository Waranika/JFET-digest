  - title: New 3D silicon chip breakthrough could extend Moore’s Law for years
    url: https://www.sciencedaily.com/releases/2026/05/260530053412.htm
    summary: As traditional chip miniaturization slows, researchers have found a way
      to pack more computing power into the same space by stacking silicon
      circuits in multiple layers. The new process uses ultra-thin silicon
      membranes and low-temperature manufacturing techniques to overcome a major
      obstacle that has long blocked the production of true 3D chips.
    imageUrl: https://www.sciencedaily.com/images/1920/3d-cpu-processor-chip.webp
