  - title: PATH to boost AI training and career opportunities for industry-aligned
      jobs
    url: https://news.mit.edu/2026/mit-raise-georgia-state-university-announce-path-0604
    summary: MIT, in collaboration with Georgia State University and a growing
      network of educational institutions, has announced expanded work under
      PATH (Pathways for AI Training and Hiring) — a multiyear initiative
      designed to scale effective, affordable, industry-aligned AI training for
      entry-level and current workers, with a particular focus on transforming
      community colleges into engines powering an AI-enabled workforce for the
      nation.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202605/mit-raise.jpg?itok=m2Y3rah1
    categories: []
