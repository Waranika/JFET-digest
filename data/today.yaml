  - title: A tiny atomic shift gives scientists powerful control over metals
    url: https://www.sciencedaily.com/releases/2026/06/260605023415.htm
    summary: A team at the University of Minnesota discovered that changing a metal
      film's thickness by just a few nanometers can dramatically alter how it
      behaves electronically. The finding reveals a surprising new way to
      control metals and could help power future advances in electronics,
      catalysis, and quantum technology.
    imageUrl: https://www.sciencedaily.com/images/1920/atomic-metal-electronic-properties.webp
