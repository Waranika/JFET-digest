    source: MIT Robotics
  - title: Millions of exploding stars could soon reveal dark energy's secrets
    url: https://www.sciencedaily.com/releases/2026/06/260621060315.htm
    summary: A new AI-powered framework could transform how astronomers measure the
      expansion of the Universe. By analyzing images of Type Ia supernovae and
      modeling their environments in unprecedented detail, researchers can
      estimate cosmic distances with near-spectroscopic accuracy. The technique
      is designed for the flood of data expected from the upcoming Vera C. Rubin
      Observatory and may greatly improve our understanding of dark energy.
    imageUrl: https://www.sciencedaily.com/images/1920/millions-of-exploding-stars.webp
    categories: []
    publishedAt: 2026-06-29T21:57:17.000Z
    source: ScienceDaily — Robotics
  - title: Dark web survey reveals Tor is smaller, shakier and more duplicated than
      expected
    url: https://techxplore.com/news/2026-06-dark-web-survey-reveals-tor.html
    summary: A study led by researchers from IMDEA Networks and Carlos III
      University of Madrid (UC3M) has carried out the first large-scale analysis
      of the volatility, content and actual infrastructure of hidden websites on
      the so-called dark web. This work was among the recipients of the
      2025–2026 Spanish Police Foundation Research Awards, which recognize
      scientific research that contributes to ensuring public safety and
      protecting citizens' rights and freedoms.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/dark-web.jpg
    categories:
      - Internet
    publishedAt: 2026-06-29T14:20:06.000Z
    source: TechXplore — Computer Science
