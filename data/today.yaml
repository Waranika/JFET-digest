  - title: The hidden atomic gap that could break next-generation computer chips
    url: https://www.sciencedaily.com/releases/2026/05/260508003125.htm
    summary: A major obstacle may be standing in the way of the next generation of
      ultra-tiny computer chips. Researchers discovered that many promising 2D
      materials lose their advantages because an invisible atomic-scale gap
      forms when they are combined with insulating layers. That tiny gap weakens
      electronic performance and could prevent further miniaturization. The team
      says new “zipper materials” that lock together more tightly may offer a
      path forward.
    imageUrl: https://www.sciencedaily.com/images/1920/2d-conductor-and-dielectric-layer-van-der-waals-gap.webp
    categories: []
    publishedAt: 2026-05-09T22:48:13.000Z
    source: ScienceDaily — Engineering
