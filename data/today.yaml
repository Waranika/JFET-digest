  - title: Compostable robot endures over 1 million uses before becoming plant food
    url: https://techxplore.com/news/2026-03-compostable-robot-million-food.html
    summary: The rapid proliferation of robots and electronic devices is placing the
      world under a new and growing environmental burden. According to the
      United Nations Institute for Training and Research (UNITAR), global
      electronic waste (e-waste) reached approximately 62 million metric tons in
      2022, a significant portion of which was neither properly collected nor
      recycled but instead landfilled or incinerated.
    imageUrl: https://scx2.b-cdn.net/gfx/news/2026/a-robot-that-endures-o.jpg
