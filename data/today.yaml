  - title: Pilot plant uses catalytic process to convert mixed plastic waste into oil
    url: https://techxplore.com/news/2026-06-catalytic-plastic-oil.html
    summary: The Catalysis Engineering Group at the University of Amsterdam (UvA)
      has developed a new robust process for the recycling of mixed plastics
      waste. A newly developed pilot plant aims to demonstrate how this can be
      transformed into valuable resources, supporting the transition toward a
      circular economy. The pilot plant will be put to the test in Spain,
      processing real municipal plastics waste.
