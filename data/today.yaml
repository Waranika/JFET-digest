  - title: Sustaining diplomacy amid competition in US-China relations
    url: https://news.mit.edu/2026/sustaining-diplomacy-amid-us-china-competition-0318
    summary: The United States and China “are the two largest emitters of carbon in
      the world,” said Nicholas Burns, former U.S. ambassador to the People’s
