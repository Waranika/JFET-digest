  - title: LiDAR approach could change factory inspections for tiny hard-to-reach
      parts
    url: https://techxplore.com/news/2026-06-lidar-approach-factory-tiny-hard.html
    summary: Researchers have developed a new LiDAR approach that makes it possible
      to image small objects with much greater precision and accuracy than
      conventional LiDAR. The method could be useful for acquiring noncontact
      measurements of critical parts or features during manufacturing.
    imageUrl: https://scx2.b-cdn.net/gfx/news/hires/2026/lidar-imaging-method-d.jpg
    categories:
      - Engineering
    publishedAt: 2026-06-30T18:00:02.000Z
    source: TechXplore — Engineering
  - title: MIT student teams win top honors in NASA competition
    url: https://news.mit.edu/2026/interdisciplinary-mit-teams-win-top-honors-nasa-competition-0630
    summary: Three teams comprising 35 students across eight different MIT
      departments and Wellesley College have been at work since fall 2025,
      designing critical early infrastructure elements that a moon base would
      require. This June, their designs were recognized with five awards at
      NASA’s 2026 Revolutionary Aerospace Systems Concepts — Academic Linkage
      (RASC-AL) Forum.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202606/mit-aeroastro-nasa-competition.jpg?itok=GLDg3KQK
    categories: []
    publishedAt: 2026-06-30T17:30:00.000Z
    source: MIT Robotics
  - title: "Q&A: What is agentic AI today, and what do we want it to be?"
    url: https://news.mit.edu/2026/agentic-ai-and-what-do-we-want-it-be-0630
    summary: The deployment of automated software systems called AI agents has
      recently exploded. A November 2025 report by MIT Sloan School of
      Management and Boston Consulting Group found that 35 percent of surveyed
      businesses had already deployed AI agents, while another 44 percent
      planned to implement agentic AI soon.
    imageUrl: https://news.mit.edu/sites/default/files/styles/news_article__cover_image__original/public/images/202606/MIT-3QAgenticAI-01.jpg?itok=CCI-vFri
    categories: []
    publishedAt: 2026-06-30T15:30:00.000Z
    source: MIT Artificial Intelligence
